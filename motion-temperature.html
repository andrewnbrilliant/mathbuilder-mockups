<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Oscillation Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 14px 18px 10px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 60%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; }

  .prompt-text {
    font-size: 14.5px; line-height: 1.5; color: #1a1a1a; margin-bottom: 12px; margin-top: 10px;
  }

  /* Graph */
  .graph-container {
    width: 100%;
    aspect-ratio: 1.15;
    position: relative;
    margin-bottom: 10px;
  }

  .graph-container svg { width: 100%; height: 100%; }

  /* Equations below graph */
  .equations {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .eq-row {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    flex-wrap: wrap;
  }

  .eq-label { color: #1a1a1a; }

  .slot {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 50px; height: 28px; padding: 0 6px;
    border: 1.5px solid #d0d0d0; border-radius: 6px;
    background: #fafafa; transition: all 0.2s;
  }
  .slot.active { border-color: #2196f3; background: #f0f5ff; }
  .slot.filled { border-color: #2196f3; background: #f0f5ff; color: #1a1a1a; }
  .slot .katex { font-size: 0.85em; }

  /* Keyboard */
  .keyboard-area {
    background: #f7f8fa; border-top: 1px solid #e8e8e8;
    padding: 10px 8px 6px;
  }
  .keyboard-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
  .keyboard-row:last-child { margin-bottom: 0; }

  .key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 38px;
    background: #fff; border: 1.5px solid #d4d7e0; border-radius: 7px;
    font-size: 16px; font-weight: 500; color: #1a1a1a;
    transition: all 0.12s; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .key.pressed { background: #e0e0e0; border-color: #999; transform: scale(0.93); box-shadow: none; }
  .key.wide { width: auto; padding: 0 7px; font-size: 13px; }
  .key .katex { font-size: 0.78em; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 10px 20px 24px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .check-btn {
    width: 100%; height: 46px; border-radius: 23px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }

  .tutor-icon {
    position: absolute; left: 20px; bottom: 24px;
    width: 38px; height: 38px; background: #2ecc40; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 18px; height: 18px; fill: #1a1a1a; }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; z-index: 10;
  }
  .replay-btn:hover { background: #e8e8e8; color: #333; }

  .stage-label {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px;
    border-radius: 12px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  .stage-label.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <button class="replay-btn" id="replay">Replay</button>
  <div class="stage-label" id="stage-label"></div>

  <div class="top-bar">
    <div class="close-btn">&times;</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">&#9889;</div>
  </div>

  <div class="content">
    <div class="prompt-text">
      Temperature oscillates on a daily cycle, but also drops at a rate of 0.5 K per day. Complete the expression that describes temperature as a function of time in days.
    </div>

    <div class="graph-container">
      <svg id="graph" viewBox="0 0 335 290" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="plot-clip">
            <rect x="45" y="10" width="280" height="250" />
          </clipPath>
        </defs>

        <!-- Thermometer (left of y-axis) -->
        <g id="thermometer-group">
          <!-- Thermometer body outline -->
          <path d="M 16 70
                   A 5 5 0 0 1 21 75
                   L 21 237
                   C 21 243 26 248 26 250
                   A 10 10 0 0 1 6 250
                   C 6 248 11 243 11 237
                   L 11 75
                   A 5 5 0 0 1 16 70
                   Z"
                fill="#fff" stroke="#e53935" stroke-width="1.5"/>

          <!-- Mercury bulb (always filled) -->
          <circle cx="16" cy="250" r="8" fill="#e53935"/>

          <!-- Mercury tube column (variable height) -->
          <rect id="mercury" x="13" y="138" width="6" height="104" fill="#e53935" rx="3"/>

          <!-- Tick marks on right side -->
          <line x1="21" y1="206" x2="27" y2="206" stroke="#c62828" stroke-width="0.8"/>
          <line x1="21" y1="172" x2="27" y2="172" stroke="#c62828" stroke-width="0.8"/>
          <line x1="21" y1="138" x2="27" y2="138" stroke="#c62828" stroke-width="0.8"/>
          <line x1="21" y1="104" x2="27" y2="104" stroke="#c62828" stroke-width="0.8"/>
        </g>

        <!-- Grid lines -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <!-- Horizontal at T=5,10,15,20 -->
          <line x1="45" y1="210" x2="325" y2="210"/>
          <line x1="45" y1="160" x2="325" y2="160"/>
          <line x1="45" y1="110" x2="325" y2="110"/>
          <line x1="45" y1="60"  x2="325" y2="60"/>
          <!-- Vertical at t=1,2,3,4 -->
          <line x1="101" y1="10" x2="101" y2="260"/>
          <line x1="157" y1="10" x2="157" y2="260"/>
          <line x1="213" y1="10" x2="213" y2="260"/>
          <line x1="269" y1="10" x2="269" y2="260"/>
        </g>

        <!-- Axes -->
        <line x1="45" y1="260" x2="330" y2="260" stroke="#888" stroke-width="1.5"/>
        <line x1="45" y1="265" x2="45" y2="5"   stroke="#888" stroke-width="1.5"/>
        <!-- Arrow heads -->
        <polygon points="330,260 323,256 323,264" fill="#888"/>
        <polygon points="45,5 41,12 49,12" fill="#888"/>

        <!-- Axis labels -->
        <text x="330" y="278" font-size="11" fill="#888" text-anchor="end">t (days)</text>
        <text x="28"  y="15"  font-size="11" fill="#888" text-anchor="start">T (&deg;C)</text>

        <!-- X-axis tick labels -->
        <text x="45"  y="278" font-size="10" fill="#999" text-anchor="middle">0</text>
        <text x="101" y="278" font-size="10" fill="#999" text-anchor="middle">1</text>
        <text x="157" y="278" font-size="10" fill="#999" text-anchor="middle">2</text>
        <text x="213" y="278" font-size="10" fill="#999" text-anchor="middle">3</text>
        <text x="269" y="278" font-size="10" fill="#999" text-anchor="middle">4</text>
        <text x="325" y="278" font-size="10" fill="#999" text-anchor="middle">5</text>

        <!-- Y-axis tick labels -->
        <text x="38" y="264" font-size="10" fill="#999" text-anchor="end">0</text>
        <text x="38" y="214" font-size="10" fill="#999" text-anchor="end">5</text>
        <text x="38" y="164" font-size="10" fill="#999" text-anchor="end">10</text>
        <text x="38" y="114" font-size="10" fill="#999" text-anchor="end">15</text>
        <text x="38" y="64"  font-size="10" fill="#999" text-anchor="end">20</text>

        <!-- Plot area (clipped) -->
        <g clip-path="url(#plot-clip)">
          <!-- Dashed prediction curve -->
          <path id="predict-curve" d="" stroke="#ff7043" stroke-width="2" fill="none"
                stroke-dasharray="8,6" opacity="0"/>
          <!-- Solid actual curve -->
          <path id="actual-curve" d="" stroke="#ff7043" stroke-width="2.5" fill="none"
                opacity="0"/>
        </g>

        <!-- Tracking dot on curve -->
        <circle id="track-dot" cx="45" cy="110" r="5" fill="#ff7043" opacity="0"/>
      </svg>
    </div>

    <!-- Equation -->
    <div class="equations">
      <div class="eq-row">
        <span class="eq-label" id="eq-pre"></span>
        <div class="slot active" id="slot1"></div>
        <span class="eq-label" id="eq-mid"></span>
        <div class="slot" id="slot2"></div>
        <span class="eq-label" id="eq-suf"></span>
      </div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <div class="key" data-val="1">1</div>
        <div class="key" data-val="2">2</div>
        <div class="key" data-val="3">3</div>
        <div class="key" data-val="4">4</div>
        <div class="key" data-val="5">5</div>
        <div class="key" data-val="6">6</div>
        <div class="key" data-val="7">7</div>
      </div>
      <div class="keyboard-row">
        <div class="key" data-val="8">8</div>
        <div class="key" data-val="9">9</div>
        <div class="key" data-val="0">0</div>
        <div class="key" data-val=".">.</div>
        <div class="key wide" data-val="neg">(&minus;)</div>
        <div class="key wide" data-val="pi" id="key-pi"></div>
        <div class="key wide" data-val="backspace">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </div>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

/* ── Coordinate transforms ── */
const GRAPH = { xMin: 45, xMax: 325, yMin: 260, yMax: 10, tMax: 5, yValMax: 25 };

function tToX(t) { return GRAPH.xMin + (t / GRAPH.tMax) * (GRAPH.xMax - GRAPH.xMin); }
function yToSvgY(y) { return GRAPH.yMin - (y / GRAPH.yValMax) * (GRAPH.yMin - GRAPH.yMax); }

/* ── Temperature function: T(t) = 5sin(2*pi*t) + (-0.5)t + 15 ── */
function tempFn(t) {
  return 5 * Math.sin(2 * Math.PI * t) + (-0.5) * t + 15;
}

/* ── Thermometer mercury ── */
const THERM_BOT = 242;    // bottom of mercury column (connects to bulb)
const THERM_RANGE = 172;  // maps T=0..25 over 172px of tube height

function updateMercury(T) {
  const clamped = Math.max(0, Math.min(25, T));
  const y = THERM_BOT - (clamped / 25) * THERM_RANGE;
  const h = THERM_BOT - y;
  const mercury = document.getElementById('mercury');
  mercury.setAttribute('y', y.toFixed(1));
  mercury.setAttribute('height', Math.max(0, h).toFixed(1));
}

/* ── Build SVG path from a function ── */
function buildPath(fn, tStart, tEnd, steps) {
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const t = tStart + (tEnd - tStart) * (i / steps);
    const x = tToX(t);
    const y = yToSvgY(fn(t));
    d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }
  return d;
}

/* ── Stage label ── */
function showLabel(text) {
  const el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1800);
}

/* ── Helpers ── */
let animRunning = false;
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function flashKey(dataVal) {
  const keyEl = document.querySelector('.key[data-val="' + dataVal + '"]');
  if (keyEl) {
    keyEl.classList.add('pressed');
    setTimeout(() => keyEl.classList.remove('pressed'), 150);
  }
}

/* ── Main animation sequence ── */
async function animate() {
  if (animRunning) return;
  animRunning = true;

  /* References */
  const predictCurve = document.getElementById('predict-curve');
  const actualCurve  = document.getElementById('actual-curve');
  const trackDot     = document.getElementById('track-dot');
  const slot1        = document.getElementById('slot1');
  const slot2        = document.getElementById('slot2');
  const checkBtn     = document.getElementById('check-btn');

  /* Reset everything */
  predictCurve.setAttribute('opacity', '0');
  predictCurve.setAttribute('d', '');
  actualCurve.setAttribute('opacity', '0');
  actualCurve.setAttribute('d', '');
  trackDot.setAttribute('opacity', '0');

  slot1.classList.add('active');
  slot1.classList.remove('filled');
  slot1.innerHTML = '';
  slot2.classList.remove('active', 'filled');
  slot2.innerHTML = '';

  checkBtn.classList.remove('ready');
  checkBtn.style.transform = '';

  /* Initial thermometer at T(0) = 15 */
  updateMercury(15);

  /* Render static equation labels */
  renderLatex(document.getElementById('eq-pre'), 'T(t) = 5\\sin(');
  renderLatex(document.getElementById('eq-mid'), '\\,t)\\;+');
  renderLatex(document.getElementById('eq-suf'), '\\,t + 15');

  await sleep(1200);

  /* ═══ STAGE 1: Type 6.28 into slot 1 ═══ */
  showLabel('Entering angular frequency...');
  const s1 = [];
  for (const ch of ['2', 'pi']) {
    await sleep(350);
    s1.push(ch);
    flashKey(ch);
    slot1.classList.add('filled');
    const display = s1.map(c => c === 'pi' ? '\\pi' : c).join('');
    renderLatex(slot1, display);
  }

  await sleep(400);
  slot1.classList.remove('active');
  slot2.classList.add('active');
  await sleep(300);

  /* ═══ STAGE 2: Type -0.5 into slot 2 ═══ */
  showLabel('Entering drift rate...');
  const s2 = [];
  for (const ch of ['neg', '0', '.', '5']) {
    await sleep(350);
    s2.push(ch);
    flashKey(ch);
    slot2.classList.add('filled');
    /* Convert tokens to displayable LaTeX */
    const display = s2.map(c => c === 'neg' ? '{-}' : c).join('');
    renderLatex(slot2, display);
  }

  await sleep(400);

  /* ═══ STAGE 3: Dashed prediction curve appears ═══ */
  predictCurve.setAttribute('d', buildPath(tempFn, 0, GRAPH.tMax, 300));
  predictCurve.setAttribute('opacity', '0.5');

  await sleep(600);
  checkBtn.classList.add('ready');

  /* ═══ STAGE 4: Pause, then press Check ═══ */
  await sleep(1500);
  showLabel('Checking answer...');
  checkBtn.style.transform = 'scale(0.97)';
  await sleep(200);
  checkBtn.style.transform = '';

  /* ═══ STAGE 5: Animate curve drawing + thermometer ═══ */
  await sleep(500);
  showLabel('Temperature evolving...');

  const ANIM_DURATION = 4000;
  const startTime = performance.now();

  actualCurve.setAttribute('opacity', '1');
  trackDot.setAttribute('opacity', '1');

  function frame(now) {
    const elapsed  = now - startTime;
    const progress = Math.min(elapsed / ANIM_DURATION, 1);
    const currentT = progress * GRAPH.tMax;
    const tempVal  = tempFn(currentT);

    /* Draw solid curve up to current time */
    const steps = Math.max(2, Math.floor(progress * 300));
    actualCurve.setAttribute('d', buildPath(tempFn, 0, currentT, steps));

    /* Move tracking dot */
    trackDot.setAttribute('cx', tToX(currentT).toFixed(1));
    trackDot.setAttribute('cy', yToSvgY(tempVal).toFixed(1));

    /* Update thermometer mercury level */
    updateMercury(tempVal);

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      /* Solid matches dashed - hide dashed */
      predictCurve.setAttribute('opacity', '0');
      animRunning = false;
    }
  }

  requestAnimationFrame(frame);
}

/* ── Initialization ── */
function init() {
  renderLatex(document.getElementById('eq-pre'), 'T(t) = 5\\sin(');
  renderLatex(document.getElementById('eq-mid'), '\\,t)\\;+');
  renderLatex(document.getElementById('eq-suf'), '\\,t + 15');
  renderLatex(document.getElementById('key-pi'), '\\pi');
  updateMercury(15);
}

document.getElementById('replay').addEventListener('click', () => {
  animRunning = false;
  setTimeout(animate, 100);
});

init();
setTimeout(animate, 800);
</script>
</body>
</html>
