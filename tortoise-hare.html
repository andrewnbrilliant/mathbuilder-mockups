<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tortoise &amp; Hare Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 14px 18px 10px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 40%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; }

  .prompt-text {
    font-size: 14px; line-height: 1.45; color: #1a1a1a; margin-bottom: 8px; margin-top: 8px;
  }

  .graph-container {
    width: 100%;
    aspect-ratio: 1.15;
    position: relative;
    margin-bottom: 4px;
  }
  .graph-container svg { width: 100%; height: 100%; }

  .legend {
    display: flex; gap: 16px; padding: 0 4px; margin-bottom: 6px; font-size: 12px; color: #666;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .coord-input {
    display: flex; align-items: center; gap: 4px; font-size: 15px; color: #1a1a1a;
    margin-bottom: 8px; padding: 0 4px; flex-wrap: wrap;
  }
  .coord-input .label-text { white-space: nowrap; }

  .slot {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 48px; height: 30px; padding: 0 6px;
    border: 1.5px solid #d0d0d0; border-radius: 6px;
    background: #fafafa; transition: all 0.2s;
  }
  .slot.active { border-color: #2196f3; background: #f0f5ff; }
  .slot.filled { border-color: #2196f3; background: #f0f5ff; color: #1a1a1a; }
  .slot .katex { font-size: 0.85em; }

  .keyboard-area {
    background: #f7f8fa; border-top: 1px solid #e8e8e8;
    padding: 8px 8px 4px;
  }
  .keyboard-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
  .keyboard-row:last-child { margin-bottom: 0; }

  .key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 36px;
    background: #fff; border: 1.5px solid #d4d7e0; border-radius: 7px;
    font-size: 16px; font-weight: 500; color: #1a1a1a;
    transition: all 0.12s; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .key.pressed { background: #e0e0e0; border-color: #999; transform: scale(0.93); box-shadow: none; }
  .key.wide { width: auto; padding: 0 12px; font-size: 13px; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 10px 20px 24px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .check-btn {
    width: 100%; height: 46px; border-radius: 23px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }
  .check-btn.correct { background: #2ecc40; color: #fff; }

  .tutor-icon {
    position: absolute; left: 20px; bottom: 24px;
    width: 38px; height: 38px; background: #2ecc40; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 18px; height: 18px; fill: #1a1a1a; }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; z-index: 10;
  }
  .replay-btn:hover { background: #e8e8e8; color: #333; }

  .stage-label {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px;
    border-radius: 12px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  .stage-label.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <button class="replay-btn" id="replay">Replay</button>
  <div class="stage-label" id="stage-label"></div>

  <div class="top-bar">
    <div class="close-btn">&times;</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">&#9889;</div>
  </div>

  <div class="content">
    <div class="prompt-text">
      A tortoise walks 100&thinsp;m at 1&thinsp;m/s. A hare waits 10&thinsp;s, lollops at 5&thinsp;m/s for 10&thinsp;s, eats grass for a minute, then sprints the rest at 10&thinsp;m/s. Give the time and distance where the hare first passes the tortoise.
    </div>

    <div class="graph-container">
      <svg id="graph" viewBox="0 0 335 290" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="plot-clip">
            <rect x="45" y="10" width="280" height="250"/>
          </clipPath>
        </defs>

        <!-- Horizontal grid (d = 20, 40, 60, 80) -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <line x1="45" y1="210" x2="325" y2="210"/>
          <line x1="45" y1="160" x2="325" y2="160"/>
          <line x1="45" y1="110" x2="325" y2="110"/>
          <line x1="45" y1="60"  x2="325" y2="60"/>
        </g>

        <!-- Vertical grid (t = 20, 40, 60, 80) -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <line x1="101" y1="10" x2="101" y2="260"/>
          <line x1="157" y1="10" x2="157" y2="260"/>
          <line x1="213" y1="10" x2="213" y2="260"/>
          <line x1="269" y1="10" x2="269" y2="260"/>
        </g>

        <!-- Axes -->
        <line x1="45" y1="260" x2="330" y2="260" stroke="#888" stroke-width="1.5"/>
        <line x1="45" y1="265" x2="45" y2="5" stroke="#888" stroke-width="1.5"/>
        <polygon points="330,260 323,256 323,264" fill="#888"/>
        <polygon points="45,5 41,12 49,12" fill="#888"/>

        <!-- Axis labels -->
        <text x="328" y="278" font-size="11" fill="#888" text-anchor="end">t (s)</text>
        <text x="28" y="15" font-size="11" fill="#888" text-anchor="middle">d (m)</text>

        <!-- t-axis ticks -->
        <text x="45"  y="278" font-size="9" fill="#999" text-anchor="middle">0</text>
        <text x="101" y="278" font-size="9" fill="#999" text-anchor="middle">20</text>
        <text x="157" y="278" font-size="9" fill="#999" text-anchor="middle">40</text>
        <text x="213" y="278" font-size="9" fill="#999" text-anchor="middle">60</text>
        <text x="269" y="278" font-size="9" fill="#999" text-anchor="middle">80</text>
        <text x="325" y="278" font-size="9" fill="#999" text-anchor="middle">100</text>

        <!-- d-axis ticks -->
        <text x="40" y="264"  font-size="9" fill="#999" text-anchor="end">0</text>
        <text x="40" y="214"  font-size="9" fill="#999" text-anchor="end">20</text>
        <text x="40" y="164"  font-size="9" fill="#999" text-anchor="end">40</text>
        <text x="40" y="114"  font-size="9" fill="#999" text-anchor="end">60</text>
        <text x="40" y="64"   font-size="9" fill="#999" text-anchor="end">80</text>
        <text x="40" y="14"   font-size="9" fill="#999" text-anchor="end">100</text>

        <!-- Curves (clipped) -->
        <g clip-path="url(#plot-clip)">
          <path id="tortoise-line" d="" stroke="#4CAF50" stroke-width="2.5" fill="none"/>
          <path id="hare-line" d="" stroke="#8D6E63" stroke-width="2.5" fill="none"/>
        </g>

        <!-- Crosshair prediction (hidden) -->
        <g id="crosshair" opacity="0">
          <circle id="ch-circle" cx="0" cy="0" r="5" fill="none" stroke="#333" stroke-width="1.5"/>
          <line id="ch-h" x1="0" y1="0" x2="0" y2="0" stroke="#333" stroke-width="1.2"/>
          <line id="ch-v" x1="0" y1="0" x2="0" y2="0" stroke="#333" stroke-width="1.2"/>
        </g>

        <!-- Correct marker (hidden) -->
        <g id="correct-marker" opacity="0">
          <circle id="cm-outer" cx="0" cy="0" r="7" fill="#2ecc40" opacity="0.3"/>
          <circle id="cm-inner" cx="0" cy="0" r="4" fill="#2ecc40"/>
        </g>

        <!-- Trace dots -->
        <circle id="tortoise-dot" cx="45" cy="260" r="4.5" fill="#4CAF50"/>
        <circle id="hare-dot" cx="45" cy="260" r="4.5" fill="#8D6E63"/>

        <!-- === TORTOISE (side-view, ~28px wide) === -->
        <g id="tortoise-icon" transform="translate(1, 253)">
          <!-- Shell dome -->
          <ellipse cx="12" cy="3" rx="9" ry="5.5" fill="#4CAF50"/>
          <!-- Shell pattern -->
          <path d="M6,1 Q12,-2 18,1" fill="none" stroke="#388E3C" stroke-width="0.7"/>
          <path d="M5,4 Q12,1 19,4" fill="none" stroke="#388E3C" stroke-width="0.7"/>
          <!-- Body underside -->
          <rect x="3" y="5" width="18" height="4" rx="2" fill="#66BB6A"/>
          <!-- Head -->
          <ellipse cx="24" cy="5" rx="4" ry="3" fill="#81C784"/>
          <!-- Eye -->
          <circle cx="26" cy="4" r="0.9" fill="#333"/>
          <!-- Mouth -->
          <path d="M27,6 Q26,7 25,6.5" fill="none" stroke="#555" stroke-width="0.4"/>
          <!-- Legs -->
          <rect x="5" y="8" width="2.5" height="4" rx="1" fill="#81C784"/>
          <rect x="16" y="8" width="2.5" height="4" rx="1" fill="#81C784"/>
        </g>

        <!-- === HARE (side-view, ~28px wide) === -->
        <g id="hare-icon" transform="translate(1, 251)">
          <!-- Tail poof -->
          <circle cx="2" cy="7" r="2.5" fill="#D7CCC8"/>
          <!-- Body -->
          <ellipse cx="13" cy="8" rx="10" ry="5.5" fill="#A1887F"/>
          <!-- Belly -->
          <ellipse cx="13" cy="10" rx="6" ry="2.5" fill="#D7CCC8"/>
          <!-- Ear (back) -->
          <ellipse cx="18" cy="-3" rx="2" ry="7" fill="#BCAAA4"/>
          <ellipse cx="18" cy="-3" rx="0.8" ry="4.5" fill="#EF9A9A"/>
          <!-- Ear (front) -->
          <ellipse cx="22" cy="-2" rx="2" ry="6.5" fill="#BCAAA4"/>
          <ellipse cx="22" cy="-2" rx="0.8" ry="4" fill="#EF9A9A"/>
          <!-- Eye -->
          <circle cx="21" cy="6" r="1.3" fill="#333"/>
          <circle cx="21.4" cy="5.5" r="0.4" fill="#fff"/>
          <!-- Nose -->
          <ellipse cx="24.5" cy="7.5" rx="1" ry="0.7" fill="#E91E63" opacity="0.6"/>
          <!-- Whiskers -->
          <line x1="25" y1="8" x2="28" y2="6.5" stroke="#bbb" stroke-width="0.3"/>
          <line x1="25" y1="8.5" x2="28" y2="8.5" stroke="#bbb" stroke-width="0.3"/>
          <!-- Hind leg -->
          <ellipse cx="6" cy="12.5" rx="2.5" ry="1.8" fill="#BCAAA4"/>
          <!-- Front leg -->
          <rect x="18" y="12" width="2.5" height="4" rx="1" fill="#BCAAA4"/>
        </g>
      </svg>
    </div>

    <!-- Legend -->
    <div class="legend">
      <span class="legend-item">
        <span class="legend-dot" style="background:#4CAF50"></span> Tortoise
      </span>
      <span class="legend-item">
        <span class="legend-dot" style="background:#8D6E63"></span> Hare
      </span>
    </div>

    <!-- Coordinate input -->
    <div class="coord-input">
      <span class="label-text">First overtake:&ensp;(&thinsp;</span>
      <div class="slot active" id="slot-t"></div>
      <span class="label-text">&thinsp;s,&ensp;</span>
      <div class="slot" id="slot-d"></div>
      <span class="label-text">&thinsp;m&thinsp;)</span>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <div class="key" data-val="1">1</div>
        <div class="key" data-val="2">2</div>
        <div class="key" data-val="3">3</div>
        <div class="key" data-val="4">4</div>
        <div class="key" data-val="5">5</div>
        <div class="key" data-val=".">.</div>
      </div>
      <div class="keyboard-row">
        <div class="key" data-val="6">6</div>
        <div class="key" data-val="7">7</div>
        <div class="key" data-val="8">8</div>
        <div class="key" data-val="9">9</div>
        <div class="key" data-val="0">0</div>
        <div class="key wide" data-val="backspace">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </div>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

// t: 0..100 -> x: 45..325
// d: 0..100 -> svgY: 260..10
const G = { xMin: 45, xMax: 325, yMin: 260, yMax: 10, tMax: 100, dMax: 100 };

function tToX(t) { return G.xMin + (t / G.tMax) * (G.xMax - G.xMin); }
function dToY(d) { return G.yMin - (d / G.dMax) * (G.yMin - G.yMax); }

// Tortoise: steady 1 m/s
function tortoiseD(t) { return Math.min(t, 100); }

// Hare: wait 10s, lollop 5 m/s for 10s, eat 60s, sprint 10 m/s
function hareD(t) {
  if (t <= 10) return 0;
  if (t <= 20) return 5 * (t - 10);        // 0 -> 50 m
  if (t <= 80) return 50;                   // eating grass
  if (t <= 85) return 50 + 10 * (t - 80);  // 50 -> 100 m
  return 100;
}

// Build path with 0.5s steps (captures all corners)
function buildPath(fn, tEnd) {
  let d = '';
  const step = 0.5;
  const n = Math.ceil(tEnd / step);
  for (let i = 0; i <= n; i++) {
    const t = Math.min(i * step, tEnd);
    const x = tToX(t);
    const y = dToY(fn(t));
    d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }
  return d;
}

// Position animal icon (centered on body at ~y=7)
function positionAnimal(id, fn, t, yOff) {
  const sy = dToY(fn(t));
  document.getElementById(id).setAttribute('transform', `translate(1, ${sy - yOff})`);
}

// Position trace dot
function positionDot(id, fn, t) {
  const dot = document.getElementById(id);
  dot.setAttribute('cx', tToX(t));
  dot.setAttribute('cy', dToY(fn(t)));
}

// Set crosshair at (t, d)
function setCrosshair(tVal, dVal) {
  const x = tToX(tVal);
  const y = dToY(dVal);
  const ch = document.getElementById('crosshair');
  document.getElementById('ch-circle').setAttribute('cx', x);
  document.getElementById('ch-circle').setAttribute('cy', y);
  document.getElementById('ch-h').setAttribute('x1', x - 6);
  document.getElementById('ch-h').setAttribute('y1', y);
  document.getElementById('ch-h').setAttribute('x2', x + 6);
  document.getElementById('ch-h').setAttribute('y2', y);
  document.getElementById('ch-v').setAttribute('x1', x);
  document.getElementById('ch-v').setAttribute('y1', y - 6);
  document.getElementById('ch-v').setAttribute('x2', x);
  document.getElementById('ch-v').setAttribute('y2', y + 6);
  ch.setAttribute('opacity', '1');
}

function setCorrectMarker(tVal, dVal) {
  const x = tToX(tVal);
  const y = dToY(dVal);
  document.getElementById('cm-outer').setAttribute('cx', x);
  document.getElementById('cm-outer').setAttribute('cy', y);
  document.getElementById('cm-inner').setAttribute('cx', x);
  document.getElementById('cm-inner').setAttribute('cy', y);
  document.getElementById('correct-marker').setAttribute('opacity', '1');
}

// Stage labels
let labelTimer = null;
function showLabel(text) {
  const el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('visible');
  if (labelTimer) clearTimeout(labelTimer);
  labelTimer = setTimeout(() => el.classList.remove('visible'), 2000);
}
function hideLabel() {
  document.getElementById('stage-label').classList.remove('visible');
}

let animRunning = false;
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function pressKey(val) {
  const key = document.querySelector(`.key[data-val="${val}"]`);
  key.classList.add('pressed');
  await sleep(100);
  key.classList.remove('pressed');
}

async function typeIntoSlot(slot, chars) {
  let text = '';
  for (const ch of chars) {
    await pressKey(ch);
    text += ch;
    slot.classList.add('filled');
    renderLatex(slot, text);
    await sleep(180);
  }
}

async function animate() {
  if (animRunning) return;
  animRunning = true;

  const tortoiseLine = document.getElementById('tortoise-line');
  const hareLine = document.getElementById('hare-line');
  const crosshair = document.getElementById('crosshair');
  const correctMarker = document.getElementById('correct-marker');
  const slotT = document.getElementById('slot-t');
  const slotD = document.getElementById('slot-d');
  const checkBtn = document.getElementById('check-btn');

  // === Reset ===
  tortoiseLine.setAttribute('d', '');
  hareLine.setAttribute('d', '');
  crosshair.setAttribute('opacity', '0');
  correctMarker.setAttribute('opacity', '0');
  slotT.classList.add('active');
  slotT.classList.remove('filled');
  slotT.innerHTML = '';
  slotD.classList.remove('active', 'filled');
  slotD.innerHTML = '';
  checkBtn.classList.remove('ready', 'correct');
  checkBtn.textContent = 'Check';

  positionAnimal('tortoise-icon', tortoiseD, 0, 7);
  positionAnimal('hare-icon', hareD, 0, 8);
  positionDot('tortoise-dot', tortoiseD, 0);
  positionDot('hare-dot', hareD, 0);

  await sleep(1000);

  // === TYPE t = 12.5 ===
  showLabel('Entering prediction...');
  await sleep(300);
  await typeIntoSlot(slotT, ['1', '2', '.', '5']);

  await sleep(400);
  slotT.classList.remove('active');
  slotD.classList.add('active');
  await sleep(300);

  // === TYPE d = 12.5 ===
  await typeIntoSlot(slotD, ['1', '2', '.', '5']);

  await sleep(300);

  // === Show crosshair ===
  setCrosshair(12.5, 12.5);

  await sleep(400);
  checkBtn.classList.add('ready');

  // === Pause, then Check ===
  await sleep(1200);
  showLabel('Checking...');
  checkBtn.style.transform = 'scale(0.97)';
  await sleep(200);
  checkBtn.style.transform = '';

  // === ANIMATE THE RACE ===
  await sleep(400);

  const ANIM_DURATION = 5000;
  const startTime = performance.now();
  let lastPhaseLabel = '';

  await new Promise(resolve => {
    function frame(now) {
      const progress = Math.min((now - startTime) / ANIM_DURATION, 1);
      const currentT = progress * G.tMax;

      // Draw lines
      tortoiseLine.setAttribute('d', buildPath(tortoiseD, currentT));
      hareLine.setAttribute('d', buildPath(hareD, currentT));

      // Move animals + dots
      positionAnimal('tortoise-icon', tortoiseD, currentT, 7);
      positionAnimal('hare-icon', hareD, currentT, 8);
      positionDot('tortoise-dot', tortoiseD, currentT);
      positionDot('hare-dot', hareD, currentT);

      // Phase labels
      let phase = '';
      if (currentT < 10) phase = 'Hare waits...';
      else if (currentT < 20) phase = 'Hare lollops!';
      else if (currentT < 80) phase = 'Hare eats grass...';
      else if (currentT < 86) phase = 'Hare sprints!';
      else phase = '';

      if (phase !== lastPhaseLabel) {
        lastPhaseLabel = phase;
        if (phase) showLabel(phase);
        else hideLabel();
      }

      if (progress < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });

  // === Correct ===
  await sleep(400);
  hideLabel();
  setCorrectMarker(12.5, 12.5);
  crosshair.setAttribute('opacity', '0');
  checkBtn.classList.remove('ready');
  checkBtn.classList.add('correct');
  checkBtn.textContent = 'Correct!';

  animRunning = false;
}

function init() {
  positionAnimal('tortoise-icon', tortoiseD, 0, 7);
  positionAnimal('hare-icon', hareD, 0, 8);
  positionDot('tortoise-dot', tortoiseD, 0);
  positionDot('hare-dot', hareD, 0);
}

document.getElementById('replay').addEventListener('click', () => {
  animRunning = false;
  setTimeout(animate, 100);
});

init();
setTimeout(animate, 800);
</script>
</body>
</html>
