<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motion Function Eval Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 14px 18px 10px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 55%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; }

  .prompt-text {
    font-size: 14.5px; line-height: 1.5; color: #1a1a1a; margin-bottom: 10px; margin-top: 10px;
  }

  .graph-container {
    width: 100%;
    aspect-ratio: 1.15;
    position: relative;
    margin-bottom: 8px;
  }
  .graph-container svg { width: 100%; height: 100%; }

  .equations {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .eq-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
  }

  /* Function eval input */
  .func-input {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 15px;
    color: #1a1a1a;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .func-input .label-text { white-space: nowrap; }

  .slot {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 52px; height: 30px; padding: 0 8px;
    border: 1.5px solid #d0d0d0; border-radius: 6px;
    background: #fafafa; transition: all 0.2s;
  }
  .slot.active { border-color: #2196f3; background: #f0f5ff; }
  .slot.filled { border-color: #2196f3; background: #f0f5ff; color: #1a1a1a; }
  .slot .katex { font-size: 0.9em; }

  /* Keyboard */
  .keyboard-area {
    background: #f7f8fa; border-top: 1px solid #e8e8e8;
    padding: 10px 8px 6px;
  }
  .keyboard-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
  .keyboard-row:last-child { margin-bottom: 0; }

  .key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 38px;
    background: #fff; border: 1.5px solid #d4d7e0; border-radius: 7px;
    font-size: 16px; font-weight: 500; color: #1a1a1a;
    transition: all 0.12s; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .key.pressed { background: #e0e0e0; border-color: #999; transform: scale(0.93); box-shadow: none; }
  .key.wide { width: auto; padding: 0 12px; font-size: 13px; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 10px 20px 24px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .check-btn {
    width: 100%; height: 46px; border-radius: 23px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }
  .check-btn.correct { background: #2ecc40; color: #fff; }

  .tutor-icon {
    position: absolute; left: 20px; bottom: 24px;
    width: 38px; height: 38px; background: #2ecc40; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 18px; height: 18px; fill: #1a1a1a; }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; z-index: 10;
  }
  .replay-btn:hover { background: #e8e8e8; color: #333; }

  .stage-label {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px;
    border-radius: 12px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  .stage-label.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <button class="replay-btn" id="replay">Replay</button>
  <div class="stage-label" id="stage-label"></div>

  <div class="top-bar">
    <div class="close-btn">&times;</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">&#9889;</div>
  </div>

  <div class="content">
    <div class="prompt-text">
      A blue car starts at position 0 and moves at 3&thinsp;m/s. What is its position at <i>t</i>&thinsp;=&thinsp;6 seconds?
    </div>

    <div class="graph-container">
      <svg id="graph" viewBox="0 0 335 290" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="plot-clip">
            <rect x="45" y="10" width="280" height="250" />
          </clipPath>
        </defs>

        <!-- Horizontal grid lines (y = 4, 8, 12, 16, 20, 24) -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <line x1="45" y1="224.3" x2="325" y2="224.3"/>
          <line x1="45" y1="188.6" x2="325" y2="188.6"/>
          <line x1="45" y1="152.9" x2="325" y2="152.9"/>
          <line x1="45" y1="117.1" x2="325" y2="117.1"/>
          <line x1="45" y1="81.4"  x2="325" y2="81.4"/>
          <line x1="45" y1="45.7"  x2="325" y2="45.7"/>
        </g>

        <!-- Vertical grid lines (t = 1..7) -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <line x1="80"  y1="10" x2="80"  y2="260"/>
          <line x1="115" y1="10" x2="115" y2="260"/>
          <line x1="150" y1="10" x2="150" y2="260"/>
          <line x1="185" y1="10" x2="185" y2="260"/>
          <line x1="220" y1="10" x2="220" y2="260"/>
          <line x1="255" y1="10" x2="255" y2="260"/>
          <line x1="290" y1="10" x2="290" y2="260"/>
        </g>

        <!-- Axes -->
        <line x1="45" y1="260" x2="330" y2="260" stroke="#888" stroke-width="1.5"/>
        <line x1="45" y1="265" x2="45" y2="5" stroke="#888" stroke-width="1.5"/>
        <polygon points="330,260 323,256 323,264" fill="#888"/>
        <polygon points="45,5 41,12 49,12" fill="#888"/>

        <!-- Axis labels -->
        <text x="330" y="278" font-size="11" fill="#888" text-anchor="end">t (s)</text>
        <text x="30" y="15" font-size="11" fill="#888" text-anchor="middle">y (m)</text>

        <!-- t-axis tick labels -->
        <text x="45"  y="278" font-size="10" fill="#999" text-anchor="middle">0</text>
        <text x="80"  y="278" font-size="10" fill="#999" text-anchor="middle">1</text>
        <text x="115" y="278" font-size="10" fill="#999" text-anchor="middle">2</text>
        <text x="150" y="278" font-size="10" fill="#999" text-anchor="middle">3</text>
        <text x="185" y="278" font-size="10" fill="#999" text-anchor="middle">4</text>
        <text x="220" y="278" font-size="10" fill="#999" text-anchor="middle">5</text>
        <text x="255" y="278" font-size="10" fill="#999" text-anchor="middle">6</text>
        <text x="290" y="278" font-size="10" fill="#999" text-anchor="middle">7</text>
        <text x="325" y="278" font-size="10" fill="#999" text-anchor="middle">8</text>

        <!-- y-axis tick labels -->
        <text x="38" y="264"   font-size="10" fill="#999" text-anchor="end">0</text>
        <text x="38" y="228.3" font-size="10" fill="#999" text-anchor="end">4</text>
        <text x="38" y="192.6" font-size="10" fill="#999" text-anchor="end">8</text>
        <text x="38" y="156.9" font-size="10" fill="#999" text-anchor="end">12</text>
        <text x="38" y="121.1" font-size="10" fill="#999" text-anchor="end">16</text>
        <text x="38" y="85.4"  font-size="10" fill="#999" text-anchor="end">20</text>
        <text x="38" y="49.7"  font-size="10" fill="#999" text-anchor="end">24</text>
        <text x="38" y="14"    font-size="10" fill="#999" text-anchor="end">28</text>

        <!-- Plot area (clipped) -->
        <g clip-path="url(#plot-clip)">
          <!-- Blue actual line (drawn during animation) -->
          <path id="blue-line" d="" stroke="#2196f3" stroke-width="2.5" fill="none"/>
        </g>

        <!-- Vertical dashed line at t=6 (prediction guide) -->
        <line id="pred-vline" x1="255" y1="260" x2="255" y2="10"
              stroke="#999" stroke-width="1" stroke-dasharray="4,4" opacity="0"/>

        <!-- Horizontal dashed line at user's y (prediction guide) -->
        <line id="pred-hline" x1="45" y1="0" x2="255" y2="0"
              stroke="#2196f3" stroke-width="1" stroke-dasharray="6,4" opacity="0"/>

        <!-- Prediction point (user's answer plotted) -->
        <g id="pred-point" opacity="0">
          <circle cx="255" cy="0" r="6" fill="none" stroke="#2196f3" stroke-width="1.5" stroke-dasharray="3,2"/>
          <circle cx="255" cy="0" r="3" fill="#2196f3" opacity="0.5"/>
        </g>

        <!-- Correct marker (shown after animation) -->
        <g id="correct-marker" opacity="0">
          <circle cx="255" cy="0" r="7" fill="#2ecc40" opacity="0.3"/>
          <circle cx="255" cy="0" r="4" fill="#2ecc40"/>
        </g>

        <!-- Blue car dot (traces on graph) -->
        <circle id="blue-dot" cx="45" cy="260" r="5" fill="#2196f3"/>

        <!-- Blue car (left of y-axis) -->
        <g id="blue-car" transform="translate(1, 246)">
          <rect x="0" y="0" width="28" height="14" rx="3" fill="#2196f3"/>
          <rect x="4" y="-6" width="14" height="8" rx="2" fill="#90caf9"/>
          <circle cx="6" cy="16" r="3.5" fill="#333"/>
          <circle cx="22" cy="16" r="3.5" fill="#333"/>
          <circle cx="6" cy="16" r="1.5" fill="#666"/>
          <circle cx="22" cy="16" r="1.5" fill="#666"/>
        </g>
      </svg>
    </div>

    <!-- Equation label -->
    <div class="equations">
      <div class="eq-row">
        <span id="eq-blue"></span>
      </div>
    </div>

    <!-- Function eval input: f(6) = [[ ]] -->
    <div class="func-input">
      <span class="label-text" id="func-label"></span>
      <div class="slot active" id="slot-y"></div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <div class="key" data-val="1">1</div>
        <div class="key" data-val="2">2</div>
        <div class="key" data-val="3">3</div>
        <div class="key" data-val="4">4</div>
        <div class="key" data-val="5">5</div>
        <div class="key" data-val=".">.</div>
      </div>
      <div class="keyboard-row">
        <div class="key" data-val="6">6</div>
        <div class="key" data-val="7">7</div>
        <div class="key" data-val="8">8</div>
        <div class="key" data-val="9">9</div>
        <div class="key" data-val="0">0</div>
        <div class="key wide" data-val="backspace">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </div>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

const GRAPH = { xMin: 45, xMax: 325, yMin: 260, yMax: 10, tMax: 8, yValMax: 28 };

function tToX(t) { return GRAPH.xMin + (t / GRAPH.tMax) * (GRAPH.xMax - GRAPH.xMin); }
function yToSvgY(y) { return GRAPH.yMin - (y / GRAPH.yValMax) * (GRAPH.yMin - GRAPH.yMax); }

function blueY(t) { return 3 * t; }

const QUERY_T = 6;
const CORRECT_Y = blueY(QUERY_T);
const QUERY_X = tToX(QUERY_T);

function buildPath(fn, tStart, tEnd, steps) {
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const t = tStart + (tEnd - tStart) * (i / steps);
    const y = fn(t);
    if (y > GRAPH.yValMax + 1) break;
    const x = tToX(t);
    const sy = yToSvgY(y);
    d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + sy.toFixed(1);
  }
  return d;
}

function positionCar(carId, dotId, fn, t) {
  const x = tToX(t);
  const yVal = fn(t);
  const sy = yToSvgY(yVal);

  document.getElementById(dotId).setAttribute('cx', x);
  document.getElementById(dotId).setAttribute('cy', sy);

  document.getElementById(carId).setAttribute('transform',
    `translate(${GRAPH.xMin - 30 - 14}, ${sy - 14})`);
}

function setPredPoint(yVal) {
  const sy = yToSvgY(yVal);

  // Position prediction point
  const pp = document.getElementById('pred-point');
  pp.querySelectorAll('circle').forEach(c => c.setAttribute('cy', sy));
  pp.setAttribute('opacity', '1');

  // Horizontal guide line from y-axis to point
  const hline = document.getElementById('pred-hline');
  hline.setAttribute('y1', sy);
  hline.setAttribute('y2', sy);
  hline.setAttribute('opacity', '0.5');

  // Vertical guide line
  document.getElementById('pred-vline').setAttribute('opacity', '0.3');
}

function setCorrectMarker(yVal) {
  const sy = yToSvgY(yVal);
  const cm = document.getElementById('correct-marker');
  cm.querySelectorAll('circle').forEach(c => c.setAttribute('cy', sy));
  cm.setAttribute('opacity', '1');
}

function showLabel(text) {
  const el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1800);
}

let animRunning = false;

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animate() {
  if (animRunning) return;
  animRunning = true;

  const blueLine = document.getElementById('blue-line');
  const predPoint = document.getElementById('pred-point');
  const predVline = document.getElementById('pred-vline');
  const predHline = document.getElementById('pred-hline');
  const correctMarker = document.getElementById('correct-marker');
  const slotY = document.getElementById('slot-y');
  const checkBtn = document.getElementById('check-btn');

  // Reset
  blueLine.setAttribute('d', '');
  predPoint.setAttribute('opacity', '0');
  predVline.setAttribute('opacity', '0');
  predHline.setAttribute('opacity', '0');
  correctMarker.setAttribute('opacity', '0');
  slotY.classList.add('active');
  slotY.classList.remove('filled');
  slotY.innerHTML = '';
  checkBtn.classList.remove('ready', 'correct');
  checkBtn.textContent = 'Check';

  positionCar('blue-car', 'blue-dot', blueY, 0);

  renderLatex(document.getElementById('eq-blue'), '\\color{#2196f3}{f(t) = 3t}');
  renderLatex(document.getElementById('func-label'), 'f(6) = ');

  await sleep(1200);

  // === Type "1" then "8" ===
  showLabel('Entering prediction...');
  await sleep(400);

  const key1 = document.querySelector('.key[data-val="1"]');
  key1.classList.add('pressed');
  await sleep(150);
  key1.classList.remove('pressed');

  slotY.classList.add('filled');
  renderLatex(slotY, '1');

  await sleep(350);

  const key8 = document.querySelector('.key[data-val="8"]');
  key8.classList.add('pressed');
  await sleep(150);
  key8.classList.remove('pressed');

  renderLatex(slotY, '18');

  await sleep(400);

  // === Plot prediction point at (6, 18) ===
  setPredPoint(18);

  await sleep(500);

  checkBtn.classList.add('ready');

  // === Pause, then press Check ===
  await sleep(1500);
  showLabel('Checking answer...');
  checkBtn.style.transform = 'scale(0.97)';
  await sleep(200);
  checkBtn.style.transform = '';

  // === Animate car along path ===
  await sleep(500);
  showLabel('Animation playing...');

  const ANIM_DURATION = 3000;
  const ANIM_T_MAX = 8;
  const startTime = performance.now();

  await new Promise(resolve => {
    function animFrame(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / ANIM_DURATION, 1);
      const currentT = progress * ANIM_T_MAX;

      positionCar('blue-car', 'blue-dot', blueY, currentT);

      const steps = Math.max(2, Math.floor(progress * 100));
      blueLine.setAttribute('d', buildPath(blueY, 0, currentT, steps));

      if (progress < 1) {
        requestAnimationFrame(animFrame);
      } else {
        resolve();
      }
    }
    requestAnimationFrame(animFrame);
  });

  // === Correct ===
  await sleep(300);
  setCorrectMarker(CORRECT_Y);
  predPoint.setAttribute('opacity', '0');
  predHline.setAttribute('opacity', '0');
  predVline.setAttribute('opacity', '0');
  checkBtn.classList.remove('ready');
  checkBtn.classList.add('correct');
  checkBtn.textContent = 'Correct!';

  animRunning = false;
}

function init() {
  renderLatex(document.getElementById('eq-blue'), '\\color{#2196f3}{f(t) = 3t}');
  renderLatex(document.getElementById('func-label'), 'f(6) = ');
  positionCar('blue-car', 'blue-dot', blueY, 0);
}

document.getElementById('replay').addEventListener('click', () => {
  animRunning = false;
  setTimeout(animate, 100);
});

init();
setTimeout(animate, 800);
</script>
</body>
</html>
