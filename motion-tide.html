<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tide Height Prediction Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 14px 18px 10px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 60%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; }

  .prompt-text {
    font-size: 14.5px; line-height: 1.5; color: #1a1a1a; margin-bottom: 12px; margin-top: 10px;
  }

  /* Graph */
  .graph-container {
    width: 100%;
    aspect-ratio: 1.15;
    position: relative;
    margin-bottom: 10px;
  }

  .graph-container svg { width: 100%; height: 100%; }

  /* Equations below graph */
  .equations {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .eq-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
  }

  .eq-label { color: #1a1a1a; }
  .eq-label.blue { color: #2196f3; }

  .slot {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 70px; height: 30px; padding: 0 8px;
    border: 1.5px solid #d0d0d0; border-radius: 6px;
    background: #fafafa; transition: all 0.2s;
  }
  .slot.active { border-color: #2196f3; background: #f0f5ff; }
  .slot.filled { border-color: #2196f3; background: #f0f5ff; color: #1a1a1a; }
  .slot .katex { font-size: 0.9em; }

  /* Keyboard */
  .keyboard-area {
    background: #f7f8fa; border-top: 1px solid #e8e8e8;
    padding: 10px 8px 6px;
  }
  .keyboard-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
  .keyboard-row:last-child { margin-bottom: 0; }

  .key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 38px;
    background: #fff; border: 1.5px solid #d4d7e0; border-radius: 7px;
    font-size: 16px; font-weight: 500; color: #1a1a1a;
    transition: all 0.12s; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .key.pressed { background: #e0e0e0; border-color: #999; transform: scale(0.93); box-shadow: none; }
  .key.wide { width: auto; padding: 0 7px; font-size: 13px; }
  .key .katex { font-size: 0.78em; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 10px 20px 24px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .check-btn {
    width: 100%; height: 46px; border-radius: 23px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }

  .tutor-icon {
    position: absolute; left: 20px; bottom: 24px;
    width: 38px; height: 38px; background: #2ecc40; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 18px; height: 18px; fill: #1a1a1a; }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; z-index: 10;
  }
  .replay-btn:hover { background: #e8e8e8; color: #333; }

  .stage-label {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px;
    border-radius: 12px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  .stage-label.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <button class="replay-btn" id="replay">Replay</button>
  <div class="stage-label" id="stage-label"></div>

  <div class="top-bar">
    <div class="close-btn">&times;</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">&#9889;</div>
  </div>

  <div class="content">
    <div class="prompt-text">
      The height of the tide on a pier varies as <span id="eq-prompt"></span>. Predict the height after 15 and 18 hours.
    </div>

    <div class="graph-container">
      <svg id="graph" viewBox="0 0 335 290" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="plot-clip">
            <rect x="45" y="10" width="280" height="250" />
          </clipPath>
          <clipPath id="tide-clip">
            <rect x="0" y="5" width="45" height="260" />
          </clipPath>
        </defs>

        <!-- Grid lines -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <!-- Horizontal: h = 2, 4, 6, 8 -->
          <line x1="45" y1="210" x2="325" y2="210"/>
          <line x1="45" y1="160" x2="325" y2="160"/>
          <line x1="45" y1="110" x2="325" y2="110"/>
          <line x1="45" y1="60" x2="325" y2="60"/>
          <!-- Vertical: t = 3, 6, 9, 12, 15, 18, 21 -->
          <line x1="80" y1="10" x2="80" y2="260"/>
          <line x1="115" y1="10" x2="115" y2="260"/>
          <line x1="150" y1="10" x2="150" y2="260"/>
          <line x1="185" y1="10" x2="185" y2="260"/>
          <line x1="220" y1="10" x2="220" y2="260"/>
          <line x1="255" y1="10" x2="255" y2="260"/>
          <line x1="290" y1="10" x2="290" y2="260"/>
        </g>

        <!-- Axes -->
        <line x1="45" y1="260" x2="330" y2="260" stroke="#888" stroke-width="1.5"/>
        <line x1="45" y1="265" x2="45" y2="5" stroke="#888" stroke-width="1.5"/>
        <!-- Arrow heads -->
        <polygon points="330,260 323,256 323,264" fill="#888"/>
        <polygon points="45,5 41,12 49,12" fill="#888"/>

        <!-- Axis labels -->
        <text x="330" y="278" font-size="11" fill="#888" text-anchor="end">t (hrs)</text>
        <text x="30" y="15" font-size="11" fill="#888" text-anchor="middle">h (m)</text>

        <!-- X-axis tick labels -->
        <text x="45" y="278" font-size="9" fill="#999" text-anchor="middle">0</text>
        <text x="80" y="278" font-size="9" fill="#999" text-anchor="middle">3</text>
        <text x="115" y="278" font-size="9" fill="#999" text-anchor="middle">6</text>
        <text x="150" y="278" font-size="9" fill="#999" text-anchor="middle">9</text>
        <text x="185" y="278" font-size="9" fill="#999" text-anchor="middle">12</text>
        <text x="220" y="278" font-size="9" fill="#999" text-anchor="middle">15</text>
        <text x="255" y="278" font-size="9" fill="#999" text-anchor="middle">18</text>
        <text x="290" y="278" font-size="9" fill="#999" text-anchor="middle">21</text>
        <text x="325" y="278" font-size="9" fill="#999" text-anchor="middle">24</text>

        <!-- Y-axis tick labels -->
        <text x="38" y="264" font-size="10" fill="#999" text-anchor="end">0</text>
        <text x="38" y="214" font-size="10" fill="#999" text-anchor="end">2</text>
        <text x="38" y="164" font-size="10" fill="#999" text-anchor="end">4</text>
        <text x="38" y="114" font-size="10" fill="#999" text-anchor="end">6</text>
        <text x="38" y="64" font-size="10" fill="#999" text-anchor="end">8</text>
        <text x="38" y="14" font-size="10" fill="#999" text-anchor="end">10</text>

        <!-- Tide assembly (water, buoy, seagull) — clipped to left of y-axis -->
        <g clip-path="url(#tide-clip)">
          <g id="tide-assembly">
            <!-- Water fill below wave surface -->
            <path id="water-fill"
                  d="M 3,0 Q 8,-3 13,0 Q 18,3 23,0 Q 28,-3 33,0 Q 38,3 43,0 L 43,300 L 3,300 Z"
                  fill="rgba(33,150,243,0.15)"/>
            <!-- Wavy water surface -->
            <path id="water-wave"
                  d="M 3,0 Q 8,-3 13,0 Q 18,3 23,0 Q 28,-3 33,0 Q 38,3 43,0"
                  stroke="#2196f3" stroke-width="1.5" fill="none"/>
            <!-- Buoy: half-circle on water -->
            <path d="M 17,-1 A 6,5 0 0,1 29,-1" fill="#e53935"/>
            <!-- Buoy antenna -->
            <line x1="23" y1="-1" x2="23" y2="-9" stroke="#555" stroke-width="1.5"/>
            <!-- Small flag on antenna -->
            <polygon points="23,-9 23,-6 27,-7.5" fill="#e53935" opacity="0.8"/>
            <!-- Seagull: M-shaped wing silhouette -->
            <path d="M 17,-12 Q 20,-16 23,-12 Q 26,-16 29,-12"
                  stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          </g>
        </g>

        <!-- Plot area (clipped) -->
        <g clip-path="url(#plot-clip)">
          <!-- Pre-drawn first period: t=0..12 -->
          <path id="curve-first" d="" stroke="#2196f3" stroke-width="2.5" fill="none"/>
          <!-- Remaining curve: t=12..24 (revealed on check) -->
          <path id="curve-second" d="" stroke="#2196f3" stroke-width="2.5" fill="none" opacity="0"/>
        </g>

        <!-- Prediction markers (appear on input) -->
        <circle id="marker-15" cx="220" cy="60" r="6" fill="#2196f3" opacity="0"/>
        <circle id="marker-18" cx="255" cy="135" r="6" fill="#2196f3" opacity="0"/>

        <!-- Tracing dot on curve -->
        <circle id="trace-dot" cx="185" cy="135" r="5" fill="#2196f3"/>
      </svg>
    </div>

    <!-- Equations / Inputs -->
    <div class="equations">
      <div class="eq-row">
        <span class="eq-label blue" id="eq-formula-label"></span>
      </div>
      <div class="eq-row">
        <span class="eq-label" id="eq-h15-label"></span>
        <span class="eq-label">=</span>
        <div class="slot active" id="slot-1"></div>
      </div>
      <div class="eq-row">
        <span class="eq-label" id="eq-h18-label"></span>
        <span class="eq-label">=</span>
        <div class="slot" id="slot-2"></div>
      </div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <div class="key" data-val="1">1</div>
        <div class="key" data-val="2">2</div>
        <div class="key" data-val="3">3</div>
        <div class="key" data-val="4">4</div>
        <div class="key" data-val="5">5</div>
        <div class="key" data-val=".">.</div>
      </div>
      <div class="keyboard-row">
        <div class="key" data-val="6">6</div>
        <div class="key" data-val="7">7</div>
        <div class="key" data-val="8">8</div>
        <div class="key" data-val="9">9</div>
        <div class="key" data-val="0">0</div>
        <div class="key wide" data-val="backspace">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </div>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

// Coordinate system
// Plot area: x = 45..325, y = 260..10
// t: 0..24 hours, h: 0..10 m
const GRAPH = { xMin: 45, xMax: 325, yMin: 260, yMax: 10, tMax: 24, yValMax: 10 };

function tToX(t) { return GRAPH.xMin + (t / GRAPH.tMax) * (GRAPH.xMax - GRAPH.xMin); }
function yToSvgY(h) { return GRAPH.yMin - (h / GRAPH.yValMax) * (GRAPH.yMin - GRAPH.yMax); }

// Tide function: h(t) = 3sin(pi*t/6) + 5
function tideH(t) { return 3 * Math.sin(Math.PI * t / 6) + 5; }

// Build SVG path for a function over [tStart, tEnd]
function buildPath(fn, tStart, tEnd, steps) {
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const t = tStart + (tEnd - tStart) * (i / steps);
    const x = tToX(t);
    const y = yToSvgY(fn(t));
    d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }
  return d;
}

// Draw the pre-existing first period (t=0..12)
function drawFirstPeriod() {
  document.getElementById('curve-first').setAttribute('d', buildPath(tideH, 0, 12, 120));
}

// Position the tide assembly (water + buoy + seagull) vertically
function positionTideAssembly(h) {
  const sy = yToSvgY(h);
  document.getElementById('tide-assembly').setAttribute('transform', `translate(0, ${sy})`);
}

// Position the tracing dot on the curve
function positionTraceDot(t) {
  const x = tToX(t);
  const y = yToSvgY(tideH(t));
  const dot = document.getElementById('trace-dot');
  dot.setAttribute('cx', x);
  dot.setAttribute('cy', y);
}

// Show stage label
function showLabel(text) {
  const el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1800);
}

// Flash a key press
function flashKey(val) {
  const keyEl = document.querySelector(`.key[data-val="${val}"]`);
  if (keyEl) {
    keyEl.classList.add('pressed');
    setTimeout(() => keyEl.classList.remove('pressed'), 150);
  }
}

let animRunning = false;

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animate() {
  if (animRunning) return;
  animRunning = true;

  // --- Reset ---
  const curveSecond = document.getElementById('curve-second');
  const slot1 = document.getElementById('slot-1');
  const slot2 = document.getElementById('slot-2');
  const checkBtn = document.getElementById('check-btn');
  const marker15 = document.getElementById('marker-15');
  const marker18 = document.getElementById('marker-18');
  const traceDot = document.getElementById('trace-dot');

  curveSecond.setAttribute('d', '');
  curveSecond.setAttribute('opacity', '0');
  slot1.className = 'slot active';
  slot1.innerHTML = '';
  slot2.className = 'slot';
  slot2.innerHTML = '';
  checkBtn.classList.remove('ready');
  marker15.setAttribute('opacity', '0');
  marker15.setAttribute('fill', '#2196f3');
  marker18.setAttribute('opacity', '0');
  marker18.setAttribute('fill', '#2196f3');

  // Draw first period and set initial positions
  drawFirstPeriod();
  positionTideAssembly(tideH(12)); // h(12) = 5
  positionTraceDot(12);

  // Render equation labels
  renderLatex(document.getElementById('eq-formula-label'), 'h(t) = 3\\sin(\\pi t/6) + 5');
  renderLatex(document.getElementById('eq-h15-label'), 'h(15)');
  renderLatex(document.getElementById('eq-h18-label'), 'h(18)');

  await sleep(1200);

  // === STAGE 1: Type "8" into slot-1 for h(15) ===
  showLabel('Entering prediction...');
  await sleep(500);

  flashKey('8');
  await sleep(200);
  slot1.className = 'slot filled';
  renderLatex(slot1, '8');

  // Show prediction marker at (15, 8)
  marker15.setAttribute('opacity', '1');

  await sleep(700);

  // === STAGE 2: Move to slot-2, type "5" for h(18) ===
  slot2.className = 'slot active';
  await sleep(500);

  flashKey('5');
  await sleep(200);
  slot2.className = 'slot filled';
  renderLatex(slot2, '5');

  // Show prediction marker at (18, 5)
  marker18.setAttribute('opacity', '1');

  await sleep(600);

  // === STAGE 3: Check button activates ===
  checkBtn.classList.add('ready');
  await sleep(1500);

  // Press check
  showLabel('Submitting answer...');
  checkBtn.style.transform = 'scale(0.97)';
  await sleep(200);
  checkBtn.style.transform = '';

  // === STAGE 4: Animate remaining curve t=12..24 ===
  await sleep(500);
  showLabel('Revealing tide...');

  const ANIM_DURATION = 3000;
  const startTime = performance.now();

  curveSecond.setAttribute('opacity', '1');

  function animFrame(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / ANIM_DURATION, 1);
    const currentT = 12 + progress * 12; // t goes from 12 to 24

    // Draw curve progressively
    const steps = Math.max(10, Math.floor(progress * 120));
    curveSecond.setAttribute('d', buildPath(tideH, 12, currentT, steps));

    // Move tracing dot along the new curve
    positionTraceDot(currentT);

    // Bob the water/buoy/seagull assembly
    positionTideAssembly(tideH(currentT));

    if (progress < 1) {
      requestAnimationFrame(animFrame);
    } else {
      // === STAGE 5: Confirm markers green ===
      setTimeout(() => {
        marker15.setAttribute('fill', '#4caf50');
        marker15.setAttribute('r', '7');
        marker18.setAttribute('fill', '#4caf50');
        marker18.setAttribute('r', '7');

        // Scale back to normal size after pop
        setTimeout(() => {
          marker15.setAttribute('r', '6');
          marker18.setAttribute('r', '6');
        }, 200);

        animRunning = false;
      }, 300);
    }
  }

  requestAnimationFrame(animFrame);
}

// === Init ===
function init() {
  renderLatex(document.getElementById('eq-prompt'), 'h(t) = 3\\sin(\\pi t/6) + 5');
  renderLatex(document.getElementById('eq-formula-label'), 'h(t) = 3\\sin(\\pi t/6) + 5');
  renderLatex(document.getElementById('eq-h15-label'), 'h(15)');
  renderLatex(document.getElementById('eq-h18-label'), 'h(18)');

  drawFirstPeriod();
  positionTideAssembly(tideH(12));
  positionTraceDot(12);
}

document.getElementById('replay').addEventListener('click', () => {
  animRunning = false;
  setTimeout(animate, 100);
});

init();
setTimeout(animate, 800);
</script>
</body>
</html>
