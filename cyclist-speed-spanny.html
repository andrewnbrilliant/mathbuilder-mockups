<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Average Speed — Dual Spanny Keyboards</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 750px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 16px 18px 12px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 50%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 24px; display: flex; flex-direction: column; }

  .spacer-top { height: 20px; }

  .prompt-text {
    font-size: 15.5px;
    line-height: 1.5;
    color: #1a1a1a;
    margin-bottom: 20px;
  }

  /* Interactive box — grid aligns the two = signs */
  .interactive-box {
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    padding: 20px 16px;
    display: grid;
    grid-template-columns: auto auto 1fr;
    align-items: center;
    column-gap: 10px;
    row-gap: 16px;
    margin-bottom: 14px;
  }

  .equation-row { display: contents; }

  .label-text { font-size: 16px; color: #1a1a1a; }
  .equals-sign { font-size: 18px; color: #1a1a1a; }

  .rhs { display: flex; align-items: center; gap: 8px; }

  .slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 56px;
    min-height: 34px;
    height: auto;
    padding: 4px 10px;
    border: 1.5px solid #d0d0d0;
    border-radius: 6px;
    background: #fafafa;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .slot:hover { border-color: #aaa; }
  .slot.active { border-color: #2196f3; background: #f0f5ff; }
  .slot.filled { color: #1a1a1a; }
  .slot .katex { font-size: 0.92em; }

  /* Keyboard area */
  .keyboard-area {
    background: #f7f8fa;
    border-top: 1px solid #e8e8e8;
    padding: 10px 8px 6px;
    min-height: 130px;
  }

  .keyboard { display: none; }
  .keyboard.visible { display: block; }

  .keyboard-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
  .keyboard-row:last-child { margin-bottom: 0; }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 38px;
    background: #fff;
    border: 1.5px solid #d4d7e0;
    border-radius: 7px;
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .key:hover { border-color: #bbb; }
  .key.pressed { background: #e0e0e0; border-color: #999; transform: scale(0.93); box-shadow: none; }

  .key.unit {
    width: auto;
    padding: 0 14px;
    font-size: 14px;
    letter-spacing: 0.3px;
  }

  .key.op {
    font-size: 20px;
    font-weight: 400;
    color: #555;
  }

  .key.wide {
    width: auto;
    padding: 0 12px;
  }

  .start-over {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 20px;
    margin-top: 4px;
  }
  .start-over:hover { color: #888; }
  .start-over svg { width: 14px; height: 14px; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 12px 24px 28px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }

  .check-btn {
    width: 100%; height: 48px; border-radius: 24px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }
  .check-btn.correct { background: #2ecc40; color: #fff; }

  .tutor-icon {
    position: absolute; left: 24px; bottom: 28px;
    width: 40px; height: 40px; background: #2ecc40; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 20px; height: 20px; fill: #1a1a1a; }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; z-index: 10;
  }
  .replay-btn:hover { background: #e8e8e8; color: #333; }

  .stage-label {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px;
    border-radius: 12px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  .stage-label.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <button class="replay-btn" id="replay">Replay</button>
  <div class="stage-label" id="stage-label"></div>

  <div class="top-bar">
    <div class="close-btn">&times;</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">&#9889;</div>
  </div>

  <div class="content">
    <div class="spacer-top"></div>

    <div class="prompt-text">
      A cyclist travels 60&thinsp;km in 3&thinsp;hours. Find their average speed.
    </div>

    <div class="interactive-box">
      <!-- Row 1: Speed = static fraction -->
      <div class="equation-row">
        <span class="label-text">Speed</span>
        <span class="equals-sign">=</span>
        <div class="rhs">
          <span id="static-frac"></span>
        </div>
      </div>

      <!-- Row 2: = [[number]] [[unit]] -->
      <div class="equation-row">
        <span></span>
        <span class="equals-sign">=</span>
        <div class="rhs">
          <div class="slot active" id="slot-num"></div>
          <div class="slot" id="slot-unit"></div>
        </div>
      </div>
    </div>

    <!-- Keyboard area: two keyboards, one visible at a time -->
    <div class="keyboard-area">
      <!-- Number keyboard -->
      <div class="keyboard visible" id="kb-num">
        <div class="keyboard-row">
          <div class="key" data-val="1">1</div>
          <div class="key" data-val="2">2</div>
          <div class="key" data-val="3">3</div>
          <div class="key" data-val="4">4</div>
          <div class="key" data-val="5">5</div>
          <div class="key op" data-val="-">&minus;</div>
        </div>
        <div class="keyboard-row">
          <div class="key" data-val="6">6</div>
          <div class="key" data-val="7">7</div>
          <div class="key" data-val="8">8</div>
          <div class="key" data-val="9">9</div>
          <div class="key" data-val="0">0</div>
          <div class="key" data-val=".">.</div>
        </div>
      </div>

      <!-- Unit keyboard -->
      <div class="keyboard" id="kb-unit">
        <div class="keyboard-row">
          <div class="key unit" data-val="km">km</div>
          <div class="key unit" data-val="hours">hours</div>
          <div class="key op" data-val="/">/</div>
        </div>
        <div class="keyboard-row">
          <div class="key op" data-val="&middot;">&middot;</div>
          <div class="key wide" data-val="backspace">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="start-over" id="start-over">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
      Start over
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

// ── State ──
let numChars = [];
let unitTokens = [];
let activeSlot = 'num';
let interactionEnabled = false;

// ── Rendering ──

function renderNumSlot() {
  const slot = document.getElementById('slot-num');
  slot.classList.toggle('filled', numChars.length > 0);
  if (numChars.length > 0) {
    renderLatex(slot, numChars.join(''));
  } else {
    slot.innerHTML = '';
  }
}

function unitTokensToLatex(tokens) {
  if (tokens.length === 0) return '';

  const slashIdx = tokens.indexOf('/');
  if (slashIdx === -1) {
    return tokens.map(t => t === '·' ? ' \\cdot ' : `\\text{${t}}`).join('');
  }

  const num = tokens.slice(0, slashIdx);
  const den = tokens.slice(slashIdx + 1);
  const numStr = num.length > 0
    ? num.map(t => `\\text{${t}}`).join(' \\cdot ')
    : '\\square';
  const denStr = den.length > 0
    ? den.map(t => `\\text{${t}}`).join(' \\cdot ')
    : '\\square';
  return `\\dfrac{${numStr}}{${denStr}}`;
}

function renderUnitSlot() {
  const slot = document.getElementById('slot-unit');
  slot.classList.toggle('filled', unitTokens.length > 0);
  if (unitTokens.length > 0) {
    renderLatex(slot, unitTokensToLatex(unitTokens));
  } else {
    slot.innerHTML = '';
  }
}

function updateCheckBtn() {
  const ready = numChars.length > 0 && unitTokens.length > 0
    && !unitTokens.includes('/') || unitTokens.indexOf('/') < unitTokens.length - 1;
  document.getElementById('check-btn').classList.toggle('ready',
    numChars.length > 0 && unitTokens.length > 0 && unitTokens[unitTokens.length - 1] !== '/');
}

// ── Keyboard switching ──

function switchToSlot(slot) {
  activeSlot = slot;
  document.getElementById('slot-num').classList.toggle('active', slot === 'num');
  document.getElementById('slot-unit').classList.toggle('active', slot === 'unit');
  document.getElementById('kb-num').classList.toggle('visible', slot === 'num');
  document.getElementById('kb-unit').classList.toggle('visible', slot === 'unit');
}

// ── Interactive handlers ──

function handleNumKey(val) {
  if (val === 'backspace') { numChars.pop(); }
  else { numChars.push(val); }
  renderNumSlot();
  updateCheckBtn();
}

function handleUnitKey(val) {
  if (val === 'backspace') { unitTokens.pop(); }
  else { unitTokens.push(val); }
  renderUnitSlot();
  updateCheckBtn();
}

function initKeyHandlers() {
  document.querySelectorAll('#kb-num .key').forEach(k => {
    k.addEventListener('click', () => {
      if (!interactionEnabled) return;
      handleNumKey(k.dataset.val);
    });
  });
  document.querySelectorAll('#kb-unit .key').forEach(k => {
    k.addEventListener('click', () => {
      if (!interactionEnabled) return;
      handleUnitKey(k.dataset.val);
    });
  });
  document.getElementById('slot-num').addEventListener('click', () => {
    if (!interactionEnabled) return;
    switchToSlot('num');
  });
  document.getElementById('slot-unit').addEventListener('click', () => {
    if (!interactionEnabled) return;
    switchToSlot('unit');
  });
}

function resetAll() {
  numChars = [];
  unitTokens = [];
  activeSlot = 'num';
  renderNumSlot();
  renderUnitSlot();
  switchToSlot('num');
  const btn = document.getElementById('check-btn');
  btn.classList.remove('ready', 'correct');
  btn.textContent = 'Check';
}

// ── Animation ──

function showLabel(text) {
  const el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1800);
}

let animRunning = false;
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function pressKey(kbId, val) {
  const key = document.querySelector(`#${kbId} .key[data-val="${CSS.escape(val)}"]`);
  key.classList.add('pressed');
  await sleep(120);
  key.classList.remove('pressed');

  if (kbId === 'kb-num') handleNumKey(val);
  else handleUnitKey(val);

  await sleep(160);
}

async function animate() {
  if (animRunning) return;
  animRunning = true;
  interactionEnabled = false;

  const checkBtn = document.getElementById('check-btn');

  resetAll();

  await sleep(1000);

  // === Number entry ===
  showLabel('Number keyboard');
  await sleep(500);

  await pressKey('kb-num', '2');
  await pressKey('kb-num', '0');

  await sleep(600);

  // === Switch to unit slot ===
  switchToSlot('unit');
  showLabel('Unit keyboard');
  await sleep(500);

  // === Unit entry: km / h ===
  await pressKey('kb-unit', 'km');
  await sleep(250);
  await pressKey('kb-unit', '/');
  await sleep(250);
  await pressKey('kb-unit', 'hours');

  await sleep(800);

  // === Check ===
  showLabel('Checking...');
  checkBtn.style.transform = 'scale(0.97)';
  await sleep(200);
  checkBtn.style.transform = '';

  await sleep(300);
  checkBtn.classList.remove('ready');
  checkBtn.classList.add('correct');
  checkBtn.textContent = 'Correct!';

  interactionEnabled = true;
  animRunning = false;
}

// ── Init ──

renderLatex(document.getElementById('static-frac'),
  '\\dfrac{60\\,\\text{km}}{3\\,\\text{hours}}');

initKeyHandlers();
resetAll();

document.getElementById('start-over').addEventListener('click', resetAll);
document.getElementById('replay').addEventListener('click', () => {
  animRunning = false;
  setTimeout(animate, 100);
});

setTimeout(animate, 600);
</script>
</body>
</html>
