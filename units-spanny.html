<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBuilder Mockup — Units Spanny</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar {
    display: flex;
    align-items: center;
    padding: 16px 18px 12px;
    gap: 12px;
  }

  .close-btn {
    font-size: 18px;
    color: #1a1a1a;
    font-weight: 300;
    cursor: pointer;
    line-height: 1;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: #e8e8e8;
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    width: 40%;
    height: 100%;
    background: #c5cc3c;
    border-radius: 3px;
  }

  .page-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .page-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #d4d4d4;
  }

  .page-dot.active { background: #9a9a9a; }

  .bolt { font-size: 18px; color: #c5cc3c; }

  .content {
    flex: 1;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
  }

  .spacer-top { height: 24px; }

  .prompt-text {
    font-size: 16px;
    line-height: 1.55;
    color: #1a1a1a;
    margin-bottom: 12px;
  }

  .context-text {
    font-size: 16px;
    line-height: 1.55;
    color: #1a1a1a;
    margin-bottom: 20px;
  }

  /* Interactive box */
  .interactive-box {
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    padding: 22px 20px;
    margin-bottom: 12px;
  }

  .equation-line {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
    font-size: 17px;
    color: #1a1a1a;
    flex-wrap: wrap;
  }

  .equation-line:last-child { margin-bottom: 0; }

  .equation-line .katex { font-size: 1.05em; }

  .static { white-space: nowrap; }

  .slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    height: 32px;
    padding: 0 8px;
    border: 1.5px solid #d0d0d0;
    border-radius: 6px;
    background: #fafafa;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .slot:hover { border-color: #aaa; }

  .slot.active {
    border-color: #5b6abf;
    background: #f0f1ff;
    box-shadow: 0 0 0 2px rgba(91, 106, 191, 0.15);
  }

  .slot.filled {
    border-color: #bbb;
    background: #f5f5f5;
    color: #1a1a1a;
  }

  .slot .katex { font-size: 0.95em; }

  /* Spanny keyboard */
  .keyboard-area {
    background: #f7f8fa;
    border-top: 1px solid #e8e8e8;
    padding: 12px 16px 8px;
  }

  .keyboard-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    justify-content: center;
  }

  .keyboard-row:last-child { margin-bottom: 0; }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    background: #fff;
    border: 1.5px solid #d4d7e0;
    border-radius: 8px;
    font-size: 17px;
    font-weight: 500;
    color: #1a1a1a;
    cursor: pointer;
    transition: all 0.08s;
    user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .key:hover {
    border-color: #999;
    background: #f5f5f5;
  }

  .key:active {
    background: #eee;
    transform: scale(0.96);
  }

  .key.backspace {
    width: 56px;
    background: #f0f0f0;
    border-color: #d0d0d0;
  }

  .key.backspace:hover {
    background: #e8e8e8;
  }

  .key .katex { font-size: 1em; }

  /* Start over */
  .start-over {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    padding: 12px 0;
  }

  .start-over:hover { color: #888; }
  .start-over svg { width: 14px; height: 14px; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 12px 24px 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .check-btn {
    width: 100%;
    height: 48px;
    border-radius: 24px;
    border: none;
    background: #f0f0f0;
    color: #bbb;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .check-btn.ready {
    background: #1a1a1a;
    color: #fff;
  }

  .tutor-icon {
    position: absolute;
    left: 24px;
    bottom: 28px;
    width: 40px;
    height: 40px;
    background: #2ecc40;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tutor-icon svg { width: 20px; height: 20px; fill: #1a1a1a; }

  .sup { font-size: 0.75em; vertical-align: super; }
</style>
</head>
<body>

<div class="phone">
  <div class="top-bar">
    <div class="close-btn">✕</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">⚡</div>
  </div>

  <div class="content">
    <div class="spacer-top"></div>

    <div class="prompt-text">
      New York has a population density of about 10,000 people per square km.
    </div>

    <div class="context-text">
      How many square metres is 1 km<sup>2</sup>?
    </div>

    <div class="interactive-box">
      <!-- Line 1: 1 km = 1000 m (static) -->
      <div class="equation-line" id="line1"></div>

      <!-- Line 2: 1 km^2 = (____ m)^2 -->
      <div class="equation-line" id="line2"></div>

      <!-- Line 3: 1 km^2 = _____ m^2 -->
      <div class="equation-line" id="line3"></div>
    </div>

    <!-- Spanny keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <div class="key" data-val="0">0</div>
        <div class="key" data-val="1">1</div>
        <div class="key" data-val="2">2</div>
        <div class="key" data-val="3">3</div>
        <div class="key" data-val="4">4</div>
      </div>
      <div class="keyboard-row">
        <div class="key" data-val="5">5</div>
        <div class="key" data-val="6">6</div>
        <div class="key" data-val="7">7</div>
        <div class="key" data-val="8">8</div>
        <div class="key" data-val="9">9</div>
        <div class="key backspace" data-val="backspace">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </div>
      </div>
    </div>

    <div class="start-over" id="start-over">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
      Start over
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false, displayMode: false });
}

const SLOTS = [
  { id: 'slot-1', value: '', answer: '1000' },
  { id: 'slot-2', value: '', answer: '1000000' },
];

let activeSlotId = 'slot-1';

function buildLines() {
  const line1 = document.getElementById('line1');
  const line2 = document.getElementById('line2');
  const line3 = document.getElementById('line3');

  // Line 1: 1 km = 1000 m
  line1.innerHTML = '';
  const s1 = document.createElement('span');
  s1.className = 'static';
  renderLatex(s1, '1 \\text{ km} = 1000 \\text{ m}');
  line1.appendChild(s1);

  // Line 2: 1 km² = (____ m)²
  line2.innerHTML = '';
  const s2a = document.createElement('span');
  s2a.className = 'static';
  renderLatex(s2a, '1 \\text{ km}^2 = (');
  line2.appendChild(s2a);

  const slot1 = document.createElement('div');
  slot1.className = 'slot active';
  slot1.id = 'slot-1';
  slot1.addEventListener('click', () => selectSlot('slot-1'));
  line2.appendChild(slot1);

  const s2b = document.createElement('span');
  s2b.className = 'static';
  renderLatex(s2b, '\\text{m})^2');
  line2.appendChild(s2b);

  // Line 3: 1 km² = _____ m²
  line3.innerHTML = '';
  const s3a = document.createElement('span');
  s3a.className = 'static';
  renderLatex(s3a, '1 \\text{ km}^2 =');
  line3.appendChild(s3a);

  const slot2 = document.createElement('div');
  slot2.className = 'slot';
  slot2.id = 'slot-2';
  slot2.addEventListener('click', () => selectSlot('slot-2'));
  line3.appendChild(slot2);

  const s3b = document.createElement('span');
  s3b.className = 'static';
  renderLatex(s3b, '\\text{m}^2');
  line3.appendChild(s3b);
}

function selectSlot(id) {
  activeSlotId = id;
  document.querySelectorAll('.slot').forEach(s => {
    s.classList.remove('active');
    if (s.id === id) s.classList.add('active');
  });
}

function updateSlotDisplay(id) {
  const slot = SLOTS.find(s => s.id === id);
  const el = document.getElementById(id);
  if (slot.value.length > 0) {
    el.classList.add('filled');
    renderLatex(el, slot.value);
  } else {
    el.classList.remove('filled');
    el.innerHTML = '';
  }
}

function checkReady() {
  const allFilled = SLOTS.every(s => s.value.length > 0);
  document.getElementById('check-btn').classList.toggle('ready', allFilled);
}

// Keyboard handlers
document.querySelectorAll('.key').forEach(key => {
  key.addEventListener('click', () => {
    if (!activeSlotId) return;
    const val = key.dataset.val;
    const slot = SLOTS.find(s => s.id === activeSlotId);

    if (val === 'backspace') {
      slot.value = slot.value.slice(0, -1);
    } else {
      slot.value += val;
    }

    updateSlotDisplay(activeSlotId);
    checkReady();
  });
});

document.getElementById('start-over').addEventListener('click', () => {
  SLOTS.forEach(s => { s.value = ''; });
  buildLines();
  activeSlotId = 'slot-1';
  selectSlot('slot-1');
  checkReady();
});

buildLines();
selectSlot('slot-1');
</script>
</body>
</html>
