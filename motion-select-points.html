<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Points Motion Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 14px 18px 10px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 45%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; }

  .prompt-text {
    font-size: 14.5px; line-height: 1.5; color: #1a1a1a; margin-bottom: 12px; margin-top: 10px;
  }

  /* Graph */
  .graph-container {
    width: 100%;
    aspect-ratio: 1.15;
    position: relative;
    margin-bottom: 10px;
  }

  .graph-container svg { width: 100%; height: 100%; }

  /* Selectable points */
  .sel-point {
    cursor: pointer;
  }
  .sel-point:hover { filter: brightness(0.95); }

  /* Equations below graph */
  .equations {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .eq-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
  }

  .eq-label { color: #1a1a1a; }
  .eq-label.blue { color: #2196f3; }

  .instruction-text {
    font-size: 13.5px;
    line-height: 1.45;
    color: #666;
    padding: 0 4px;
    margin-bottom: 10px;
  }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 10px 20px 24px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .check-btn {
    width: 100%; height: 46px; border-radius: 23px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }
  .check-btn.pressed { transform: scale(0.97); }

  .tutor-icon {
    position: absolute; left: 20px; bottom: 24px;
    width: 38px; height: 38px; background: #2ecc40; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 18px; height: 18px; fill: #1a1a1a; }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; z-index: 10;
  }
  .replay-btn:hover { background: #e8e8e8; color: #333; }

  .stage-label {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px;
    border-radius: 12px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  .stage-label.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <button class="replay-btn" id="replay">Replay</button>
  <div class="stage-label" id="stage-label"></div>

  <div class="top-bar">
    <div class="close-btn">&times;</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">&#9889;</div>
  </div>

  <div class="content">
    <div class="prompt-text">
      A car starts at position 2 m and travels at 3 m/s. Select the points that the car will pass through.
    </div>

    <div class="graph-container">
      <svg id="graph" viewBox="0 0 335 290" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="plot-clip">
            <rect x="45" y="10" width="280" height="250" />
          </clipPath>
        </defs>

        <!-- Grid lines (generated by JS in init) -->
        <g id="gridlines" stroke="#e8e8e8" stroke-width="0.5"></g>

        <!-- Axes -->
        <line x1="45" y1="260" x2="330" y2="260" stroke="#888" stroke-width="1.5"/>
        <line x1="45" y1="265" x2="45" y2="5" stroke="#888" stroke-width="1.5"/>
        <!-- Arrow heads -->
        <polygon points="330,260 323,256 323,264" fill="#888"/>
        <polygon points="45,5 41,12 49,12" fill="#888"/>

        <!-- Axis labels -->
        <text x="330" y="278" font-size="11" fill="#888" text-anchor="end">t (s)</text>
        <text x="30" y="15" font-size="11" fill="#888" text-anchor="middle">y (m)</text>

        <!-- Tick labels (generated by JS) -->
        <g id="tick-labels"></g>

        <!-- Plot area (clipped) -->
        <g clip-path="url(#plot-clip)">
          <!-- Motion line (drawn on animation) -->
          <path id="motion-line" d="" stroke="#2196f3" stroke-width="2.5" fill="none" opacity="0"/>
        </g>

        <!-- Tracing dot on the curve -->
        <circle id="trace-dot" cx="45" cy="260" r="5" fill="#2196f3" opacity="0"/>

        <!-- Selectable points (generated by JS) -->
        <g id="points-group"></g>

        <!-- Car SVG (left of y-axis, moves vertically) -->
        <g id="car" transform="translate(1, 224)">
          <rect x="0" y="0" width="28" height="14" rx="3" fill="#2196f3"/>
          <rect x="4" y="-6" width="14" height="8" rx="2" fill="#90caf9"/>
          <circle cx="6" cy="16" r="3.5" fill="#333"/>
          <circle cx="22" cy="16" r="3.5" fill="#333"/>
          <circle cx="6" cy="16" r="1.5" fill="#666"/>
          <circle cx="22" cy="16" r="1.5" fill="#666"/>
        </g>
      </svg>
    </div>

    <!-- Equation label -->
    <div class="equations">
      <div class="eq-row">
        <span class="eq-label blue" id="eq-label"></span>
      </div>
    </div>

    <div class="instruction-text" id="instruction">
      Select the points the car will pass through.
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

// Coordinate transforms
const GRAPH = { xMin: 45, xMax: 325, yMin: 260, yMax: 10, tMax: 5.5, yValMax: 22 };

function tToX(t) { return GRAPH.xMin + (t / GRAPH.tMax) * (GRAPH.xMax - GRAPH.xMin); }
function yToSvgY(y) { return GRAPH.yMin - (y / GRAPH.yValMax) * (GRAPH.yMin - GRAPH.yMax); }

// The actual function: y = 3t + 2
function motionY(t) { return 3 * t + 2; }

// Points data: [t, y, isCorrect]
const POINTS = [
  { t: 0, y: 2,  correct: true  },
  { t: 1, y: 5,  correct: true  },
  { t: 2, y: 6,  correct: false },
  { t: 2, y: 8,  correct: true  },
  { t: 3, y: 11, correct: true  },
  { t: 3, y: 14, correct: false },
  { t: 4, y: 12, correct: false },
  { t: 4, y: 14, correct: true  },
];

// Correct points to auto-select in order
const CORRECT_ORDER = [0, 1, 3, 4, 7]; // indices into POINTS

// Point state
let pointStates = []; // true = selected

// Build grid and labels
function buildGrid() {
  const gridG = document.getElementById('gridlines');
  const tickG = document.getElementById('tick-labels');
  gridG.innerHTML = '';
  tickG.innerHTML = '';

  // Horizontal gridlines at y = 5, 10, 15, 20
  for (let yv = 5; yv <= 20; yv += 5) {
    const sy = yToSvgY(yv);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 45); line.setAttribute('y1', sy.toFixed(1));
    line.setAttribute('x2', 325); line.setAttribute('y2', sy.toFixed(1));
    gridG.appendChild(line);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', 38); label.setAttribute('y', (sy + 4).toFixed(1));
    label.setAttribute('font-size', '10'); label.setAttribute('fill', '#999');
    label.setAttribute('text-anchor', 'end');
    label.textContent = yv;
    tickG.appendChild(label);
  }

  // y=0 label
  const yZero = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  yZero.setAttribute('x', 38); yZero.setAttribute('y', 264);
  yZero.setAttribute('font-size', '10'); yZero.setAttribute('fill', '#999');
  yZero.setAttribute('text-anchor', 'end');
  yZero.textContent = '0';
  tickG.appendChild(yZero);

  // Vertical gridlines at t = 1..5
  for (let tv = 1; tv <= 5; tv++) {
    const sx = tToX(tv);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', sx.toFixed(1)); line.setAttribute('y1', 10);
    line.setAttribute('x2', sx.toFixed(1)); line.setAttribute('y2', 260);
    gridG.appendChild(line);
  }

  // t tick labels: 0..5
  for (let tv = 0; tv <= 5; tv++) {
    const sx = tToX(tv);
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', sx.toFixed(1)); label.setAttribute('y', 278);
    label.setAttribute('font-size', '10'); label.setAttribute('fill', '#999');
    label.setAttribute('text-anchor', 'middle');
    label.textContent = tv;
    tickG.appendChild(label);
  }
}

// Build selectable point circles
function buildPoints() {
  const group = document.getElementById('points-group');
  group.innerHTML = '';
  pointStates = POINTS.map(() => false);

  POINTS.forEach((p, i) => {
    const cx = tToX(p.t);
    const cy = yToSvgY(p.y);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx.toFixed(1));
    circle.setAttribute('cy', cy.toFixed(1));
    circle.setAttribute('r', 8);
    circle.setAttribute('fill', '#ddd');
    circle.setAttribute('stroke', '#aaa');
    circle.setAttribute('stroke-width', '1.5');
    circle.setAttribute('data-index', i);
    circle.classList.add('sel-point');
    circle.id = 'point-' + i;

    group.appendChild(circle);
  });
}

// Update point visual
function setPointSelected(idx, selected) {
  const circle = document.getElementById('point-' + idx);
  pointStates[idx] = selected;

  if (selected) {
    circle.setAttribute('fill', '#2196f3');
    circle.setAttribute('stroke', '#fff');
    circle.setAttribute('stroke-width', '2');
    // Pulse animation via temporary transform
    triggerPulse(circle);
  } else {
    circle.setAttribute('fill', '#ddd');
    circle.setAttribute('stroke', '#aaa');
    circle.setAttribute('stroke-width', '1.5');
  }
}

function setPointCorrect(idx) {
  const circle = document.getElementById('point-' + idx);
  circle.setAttribute('fill', '#4caf50');
  circle.setAttribute('stroke', '#fff');
  circle.setAttribute('stroke-width', '2');
  triggerPulse(circle);
}

function triggerPulse(circle) {
  // Animate radius: 8 -> 12 -> 8
  const baseR = 8;
  const peakR = 13;
  const duration = 300;
  const start = performance.now();

  function pulseFrame(now) {
    const progress = Math.min((now - start) / duration, 1);
    // Ease out: quick expand, slow contract
    let r;
    if (progress < 0.4) {
      r = baseR + (peakR - baseR) * (progress / 0.4);
    } else {
      r = peakR - (peakR - baseR) * ((progress - 0.4) / 0.6);
    }
    circle.setAttribute('r', r.toFixed(1));
    if (progress < 1) requestAnimationFrame(pulseFrame);
  }
  requestAnimationFrame(pulseFrame);
}

// Build the motion line path
function buildLinePath(tStart, tEnd, steps) {
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const t = tStart + (tEnd - tStart) * (i / steps);
    const x = tToX(t);
    const y = yToSvgY(motionY(t));
    d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }
  return d;
}

// Position car on y-axis
function positionCar(yVal) {
  const sy = yToSvgY(yVal);
  document.getElementById('car').setAttribute('transform',
    `translate(1, ${(sy - 14).toFixed(1)})`);
}

// Position trace dot on curve
function positionTraceDot(t) {
  const dot = document.getElementById('trace-dot');
  dot.setAttribute('cx', tToX(t).toFixed(1));
  dot.setAttribute('cy', yToSvgY(motionY(t)).toFixed(1));
}

// Show stage label
function showLabel(text, duration) {
  const el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), duration || 1800);
}

// Update check button
function updateCheckBtn() {
  const anySelected = pointStates.some(s => s);
  const btn = document.getElementById('check-btn');
  if (anySelected) {
    btn.classList.add('ready');
  } else {
    btn.classList.remove('ready');
  }
}

let animRunning = false;

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animate() {
  if (animRunning) return;
  animRunning = true;

  // Reset everything
  const motionLine = document.getElementById('motion-line');
  const traceDot = document.getElementById('trace-dot');
  const checkBtn = document.getElementById('check-btn');

  motionLine.setAttribute('opacity', '0');
  motionLine.setAttribute('d', '');
  traceDot.setAttribute('opacity', '0');
  checkBtn.classList.remove('ready');

  buildPoints();
  positionCar(2);
  renderLatex(document.getElementById('eq-label'), 'y = 3t + 2');

  await sleep(1200);

  // === STAGE 1: Select correct points one by one ===
  showLabel('Selecting points...', 3500);

  for (const idx of CORRECT_ORDER) {
    await sleep(700);
    if (!animRunning) return;
    setPointSelected(idx, true);
    updateCheckBtn();
  }

  await sleep(800);

  // === STAGE 2: Check button activates ===
  checkBtn.classList.add('ready');
  await sleep(1200);

  // === STAGE 3: Press Check ===
  showLabel('Submitting...', 1500);
  checkBtn.classList.add('pressed');
  await sleep(200);
  checkBtn.classList.remove('pressed');

  await sleep(800);

  // === STAGE 4: Draw the line and animate the car ===
  showLabel('Animation playing...', 3500);

  motionLine.setAttribute('opacity', '1');
  traceDot.setAttribute('opacity', '1');

  const ANIM_DURATION = 3000;
  const ANIM_T_MAX = 5;
  const startTime = performance.now();

  await new Promise(resolve => {
    function animFrame(now) {
      if (!animRunning) { resolve(); return; }

      const elapsed = now - startTime;
      const progress = Math.min(elapsed / ANIM_DURATION, 1);
      const currentT = progress * ANIM_T_MAX;

      // Draw partial motion line
      motionLine.setAttribute('d', buildLinePath(0, currentT, Math.max(2, Math.floor(progress * 100))));

      // Move car along y-axis
      positionCar(motionY(currentT));

      // Move trace dot along curve
      positionTraceDot(currentT);

      if (progress < 1) {
        requestAnimationFrame(animFrame);
      } else {
        resolve();
      }
    }
    requestAnimationFrame(animFrame);
  });

  // === STAGE 5: Turn correctly selected points green ===
  await sleep(400);

  for (const idx of CORRECT_ORDER) {
    await sleep(250);
    if (!animRunning) return;
    setPointCorrect(idx);
  }

  await sleep(500);
  animRunning = false;
}

// Init
function init() {
  buildGrid();
  buildPoints();
  positionCar(2);
  renderLatex(document.getElementById('eq-label'), 'y = 3t + 2');
}

document.getElementById('replay').addEventListener('click', () => {
  animRunning = false;
  setTimeout(animate, 100);
});

init();
setTimeout(animate, 800);
</script>
</body>
</html>
