<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathBuilder Mockup — mph to m/s (v3)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 16px 18px 12px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; cursor: pointer; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 45%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; align-items: center; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 24px; display: flex; flex-direction: column; }
  .spacer-top { height: 32px; }

  .prompt-text {
    font-size: 16px; line-height: 1.55; color: #1a1a1a; margin-bottom: 24px;
  }

  /* Interactive box */
  .interactive-box {
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    padding: 20px 12px;
    margin-bottom: 16px;
  }

  .eq-line {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    justify-content: center;
  }

  .eq-line:last-child { margin-bottom: 0; }
  .eq-line .katex { font-size: 0.95em; }
  .static-math .katex { font-size: 0.95em; }

  .big-fraction {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .frac-bar {
    width: 100%;
    height: 1.5px;
    background: #1a1a1a;
    min-width: 44px;
  }

  .frac-num, .frac-den {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 2px 4px;
  }

  .slot {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 50px;
    height: 28px;
    padding: 0 6px;
    border: 1.5px solid #d0d0d0;
    border-radius: 6px;
    background: #fafafa;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .slot:hover { border-color: #aaa; }
  .slot.active { border-color: #888; background: #f5f5f5; }
  .slot.filled { border-color: #bbb; background: #f5f5f5; color: #1a1a1a; }
  .slot .katex { font-size: 0.82em; }

  /* Calculator result */
  .calc-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 12px;
    margin-top: 14px;
    border-top: 1px solid #eee;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .calc-row.visible { opacity: 1; }
  .calc-result { font-size: 15px; color: #555; }
  .calc-result .katex { font-size: 0.95em; color: #555; }

  /* Tile bank */
  .bank-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 4px;
    margin-bottom: 20px;
    justify-content: center;
  }

  .tile {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    height: 40px;
    padding: 0 10px;
    background: #fff;
    border: 1.5px solid #d0d0d0;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    color: #1a1a1a;
    cursor: pointer;
    transition: all 0.1s;
    user-select: none;
  }

  .tile:hover { border-color: #999; }
  .tile:active { background: #f5f5f5; }
  .tile.used { opacity: 0; pointer-events: none; }
  .tile .katex { font-size: 0.85em; }

  .tile-fraction {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding: 4px 10px;
    min-height: 44px;
    height: auto;
  }

  .tile-frac-bar {
    width: 100%;
    height: 1px;
    background: #1a1a1a;
    min-width: 28px;
  }

  .tile-frac-part { font-size: 13px; line-height: 1.2; }
  .tile-frac-part .katex { font-size: 0.78em; }

  .start-over {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; color: #aaa; font-size: 14px; cursor: pointer; margin-bottom: 24px;
  }
  .start-over:hover { color: #888; }
  .start-over svg { width: 14px; height: 14px; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 12px 24px 28px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }

  .check-btn {
    width: 100%; height: 48px; border-radius: 24px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }

  .tutor-icon {
    position: absolute; left: 24px; bottom: 28px;
    width: 40px; height: 40px; background: #2ecc40; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 20px; height: 20px; fill: #1a1a1a; }
</style>
</head>
<body>

<div class="phone">
  <div class="top-bar">
    <div class="close-btn">✕</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">⚡</div>
  </div>

  <div class="content">
    <div class="spacer-top"></div>

    <div class="prompt-text">
      What is 30 miles per hour in metres per second?
    </div>

    <div class="interactive-box">
      <!-- Line 1: 30 mile/hour -->
      <div class="eq-line">
        <span class="static-math" id="r1"></span>
      </div>

      <!-- Line 2: = 30 mile/hour × [▢]/[▢] × [▢]/[▢] -->
      <div class="eq-line">
        <span class="static-math" id="eq1"></span>
        <span class="static-math" id="r2-coeff"></span>

        <span class="static-math" id="r2-times1"></span>
        <div class="big-fraction">
          <div class="frac-num">
            <div class="slot active" id="slot-f1-num"></div>
          </div>
          <div class="frac-bar"></div>
          <div class="frac-den">
            <div class="slot" id="slot-f1-den"></div>
          </div>
        </div>

        <span class="static-math" id="r2-times2"></span>
        <div class="big-fraction">
          <div class="frac-num">
            <div class="slot" id="slot-f2-num"></div>
          </div>
          <div class="frac-bar"></div>
          <div class="frac-den">
            <div class="slot" id="slot-f2-den"></div>
          </div>
        </div>
      </div>

      <!-- Calculator result -->
      <div class="calc-row" id="calc-row">
        <span class="calc-result" id="calc-result"></span>
      </div>
    </div>

    <!-- Tile bank -->
    <div class="bank-area" id="bank"></div>

    <div class="start-over" id="start-over">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
      Start over
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

const TILES = [
  { id: 0, slotLatex: '1609 \\text{ m}',  numValue: 1609 },
  { id: 1, slotLatex: '3600 \\text{ s}',   numValue: 3600 },
  { id: 2, slotLatex: '1 \\text{ hour}',   numValue: 1 },
  { id: 3, slotLatex: '1 \\text{ mile}',   numValue: 1 },
];

const SLOT_IDS = ['slot-f1-num', 'slot-f1-den', 'slot-f2-num', 'slot-f2-den'];

const SLOTS = {};
SLOT_IDS.forEach(id => { SLOTS[id] = { value: null, tileIndex: null }; });

let activeSlotId = 'slot-f1-num';

function initStatic() {
  renderLatex(document.getElementById('r1'), '30 \\; \\dfrac{\\text{mile}}{\\text{hour}}');
  renderLatex(document.getElementById('eq1'), '=');
  renderLatex(document.getElementById('r2-coeff'), '30 \\; \\dfrac{\\text{mile}}{\\text{hour}}');
  renderLatex(document.getElementById('r2-times1'), '\\times');
  renderLatex(document.getElementById('r2-times2'), '\\times');
}

function buildBank() {
  const bank = document.getElementById('bank');
  bank.innerHTML = '';

  TILES.forEach((t, i) => {
    const tile = document.createElement('div');
    tile.dataset.index = i;

    if (t.isFraction) {
      tile.className = 'tile tile-fraction';
      const num = document.createElement('span');
      num.className = 'tile-frac-part';
      renderLatex(num, t.fracNum);
      const bar = document.createElement('div');
      bar.className = 'tile-frac-bar';
      const den = document.createElement('span');
      den.className = 'tile-frac-part';
      renderLatex(den, t.fracDen);
      tile.appendChild(num);
      tile.appendChild(bar);
      tile.appendChild(den);
    } else {
      tile.className = 'tile';
      renderLatex(tile, t.slotLatex);
    }

    tile.addEventListener('click', () => placeTile(i));
    bank.appendChild(tile);
  });
}

function init() {
  initStatic();
  buildBank();

  SLOT_IDS.forEach(id => {
    SLOTS[id] = { value: null, tileIndex: null };
    const el = document.getElementById(id);
    el.classList.remove('filled', 'active');
    el.innerHTML = '';
  });

  activeSlotId = 'slot-f1-num';
  selectSlot('slot-f1-num');
  document.getElementById('check-btn').classList.remove('ready');
  document.getElementById('calc-row').classList.remove('visible');
}

function selectSlot(id) {
  activeSlotId = id;
  document.querySelectorAll('.slot').forEach(s => {
    s.classList.remove('active');
    if (s.id === id && !s.classList.contains('filled')) s.classList.add('active');
  });
}

function placeTile(tileIndex) {
  if (!activeSlotId) return;

  const tile = TILES[tileIndex];
  const slot = SLOTS[activeSlotId];
  const slotEl = document.getElementById(activeSlotId);
  const tileEl = document.querySelector(`.tile[data-index="${tileIndex}"]`);

  if (slot.tileIndex !== null) {
    const oldTileEl = document.querySelector(`.tile[data-index="${slot.tileIndex}"]`);
    if (oldTileEl) oldTileEl.classList.remove('used');
  }

  slotEl.classList.remove('active');
  slotEl.classList.add('filled');
  renderLatex(slotEl, tile.slotLatex);

  tileEl.classList.add('used');
  slot.value = tile.numValue;
  slot.tileIndex = tileIndex;

  activeSlotId = null;

  const nextEmpty = SLOT_IDS.find(id => SLOTS[id].value === null);
  if (nextEmpty) selectSlot(nextEmpty);

  updateCalc();
}

function updateCalc() {
  const allFilled = SLOT_IDS.every(id => SLOTS[id].value !== null);
  const calcRow = document.getElementById('calc-row');
  const calcResult = document.getElementById('calc-result');
  const checkBtn = document.getElementById('check-btn');

  if (allFilled) {
    // 30 × (mile/hour) × (f1num / f1den) × (f2num / f2den)
    const f1num = SLOTS['slot-f1-num'].value;
    const f1den = SLOTS['slot-f1-den'].value;
    const f2num = SLOTS['slot-f2-num'].value;
    const f2den = SLOTS['slot-f2-den'].value;
    const result = 30 * (f1num / f1den) * (f2num / f2den);

    // Determine resulting unit from filled tiles
    // Build unit string from non-cancelled units
    const f1numTile = TILES[SLOTS['slot-f1-num'].tileIndex];
    const f1denTile = TILES[SLOTS['slot-f1-den'].tileIndex];
    const f2numTile = TILES[SLOTS['slot-f2-num'].tileIndex];
    const f2denTile = TILES[SLOTS['slot-f2-den'].tileIndex];

    const formatted = result.toLocaleString('en-US', {
      maximumFractionDigits: 2,
      minimumFractionDigits: 1,
    });

    renderLatex(calcResult, '\\approx ' + formatted);
    calcRow.classList.add('visible');
    checkBtn.classList.add('ready');
  } else {
    calcRow.classList.remove('visible');
    checkBtn.classList.remove('ready');
  }
}

document.querySelectorAll('.slot').forEach(el => {
  el.addEventListener('click', () => {
    if (el.classList.contains('filled')) {
      const slot = SLOTS[el.id];
      if (slot.tileIndex !== null) {
        const tileEl = document.querySelector(`.tile[data-index="${slot.tileIndex}"]`);
        if (tileEl) tileEl.classList.remove('used');
      }
      slot.value = null;
      slot.tileIndex = null;
      el.classList.remove('filled');
      el.innerHTML = '';
      selectSlot(el.id);
      updateCalc();
    } else {
      selectSlot(el.id);
    }
  });
});

document.getElementById('start-over').addEventListener('click', init);

init();
</script>
</body>
</html>
