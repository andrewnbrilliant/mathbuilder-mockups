<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Leak Mockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 30px;
    min-height: 100vh;
  }

  .phone {
    width: 375px;
    min-height: 812px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .top-bar { display: flex; align-items: center; padding: 14px 18px 10px; gap: 12px; }
  .close-btn { font-size: 18px; color: #1a1a1a; font-weight: 300; line-height: 1; }
  .progress-track { flex: 1; height: 6px; background: #e8e8e8; border-radius: 3px; overflow: hidden; }
  .progress-fill { width: 55%; height: 100%; background: #c5cc3c; border-radius: 3px; }
  .page-dots { display: flex; gap: 5px; }
  .page-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d4; }
  .page-dot.active { background: #9a9a9a; }
  .bolt { font-size: 18px; color: #c5cc3c; }

  .content { flex: 1; padding: 0 20px; display: flex; flex-direction: column; }

  .prompt-text {
    font-size: 14.5px; line-height: 1.5; color: #1a1a1a; margin-bottom: 10px; margin-top: 10px;
  }

  .graph-container {
    width: 100%;
    aspect-ratio: 1.15;
    position: relative;
    margin-bottom: 8px;
  }
  .graph-container svg { width: 100%; height: 100%; }

  /* Function eval input */
  .func-input {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 15px;
    color: #1a1a1a;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .slot {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 52px; height: 30px; padding: 0 8px;
    border: 1.5px solid #d0d0d0; border-radius: 6px;
    background: #fafafa; transition: all 0.2s;
  }
  .slot.active { border-color: #2196f3; background: #f0f5ff; }
  .slot.filled { border-color: #2196f3; background: #f0f5ff; color: #1a1a1a; }
  .slot .katex { font-size: 0.9em; }

  /* Keyboard */
  .keyboard-area {
    background: #f7f8fa; border-top: 1px solid #e8e8e8;
    padding: 10px 8px 6px;
  }
  .keyboard-row { display: flex; gap: 4px; margin-bottom: 4px; justify-content: center; }
  .keyboard-row:last-child { margin-bottom: 0; }

  .key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 38px;
    background: #fff; border: 1.5px solid #d4d7e0; border-radius: 7px;
    font-size: 16px; font-weight: 500; color: #1a1a1a;
    transition: all 0.12s; user-select: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .key.pressed { background: #e0e0e0; border-color: #999; transform: scale(0.93); box-shadow: none; }
  .key.wide { width: auto; padding: 0 12px; font-size: 13px; }

  .bottom-spacer { flex: 1; }

  .bottom-bar {
    padding: 10px 20px 24px;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  .check-btn {
    width: 100%; height: 46px; border-radius: 23px; border: none;
    background: #f0f0f0; color: #bbb; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.3s;
  }
  .check-btn.ready { background: #1a1a1a; color: #fff; }
  .check-btn.correct { background: #2ecc40; color: #fff; }

  .tutor-icon {
    position: absolute; left: 20px; bottom: 24px;
    width: 38px; height: 38px; background: #2ecc40; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
  }
  .tutor-icon svg { width: 18px; height: 18px; fill: #1a1a1a; }

  .replay-btn {
    position: absolute; top: 14px; right: 14px;
    background: #f0f0f0; border: 1px solid #ddd; border-radius: 8px;
    padding: 5px 10px; font-size: 12px; color: #666; cursor: pointer; z-index: 10;
  }
  .replay-btn:hover { background: #e8e8e8; color: #333; }

  .stage-label {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 4px 12px;
    border-radius: 12px; font-size: 12px; opacity: 0; transition: opacity 0.3s;
    z-index: 10; white-space: nowrap;
  }
  .stage-label.visible { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <button class="replay-btn" id="replay">Replay</button>
  <div class="stage-label" id="stage-label"></div>

  <div class="top-bar">
    <div class="close-btn">&times;</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="page-dots">
      <div class="page-dot"></div>
      <div class="page-dot"></div>
      <div class="page-dot active"></div>
      <div class="page-dot"></div>
      <div class="page-dot"></div>
    </div>
    <div class="bolt">&#9889;</div>
  </div>

  <div class="content">
    <div class="prompt-text">
      A tank has a leak. The amount of water above the leak halves every hour. Find the height of the leak.
    </div>

    <div class="graph-container">
      <svg id="graph" viewBox="0 0 335 290" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="plot-clip">
            <rect x="45" y="10" width="280" height="250"/>
          </clipPath>
          <clipPath id="tank-clip">
            <rect x="6" y="8" width="28" height="252"/>
          </clipPath>
        </defs>

        <!-- Horizontal grid lines (h = 4, 8, 12, 16) -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <line x1="45" y1="210" x2="325" y2="210"/>
          <line x1="45" y1="160" x2="325" y2="160"/>
          <line x1="45" y1="110" x2="325" y2="110"/>
          <line x1="45" y1="60"  x2="325" y2="60"/>
        </g>

        <!-- Vertical grid lines (t = 1..5) -->
        <g stroke="#e8e8e8" stroke-width="0.5">
          <line x1="91.7"  y1="10" x2="91.7"  y2="260"/>
          <line x1="138.3" y1="10" x2="138.3" y2="260"/>
          <line x1="185"   y1="10" x2="185"   y2="260"/>
          <line x1="231.7" y1="10" x2="231.7" y2="260"/>
          <line x1="278.3" y1="10" x2="278.3" y2="260"/>
        </g>

        <!-- Tank: water fill (clipped to tank interior) -->
        <g clip-path="url(#tank-clip)">
          <rect id="water-fill" x="6" y="10" width="28" height="250" fill="#90CAF9"/>
        </g>

        <!-- Tank: walls (U-shape, open top) -->
        <path d="M 6,8 L 6,260 L 34,260 L 34,8" fill="none" stroke="#aaa" stroke-width="1.5"/>

        <!-- Tank: water surface line -->
        <line id="water-surface" x1="6" y1="10" x2="34" y2="10" stroke="#42A5F5" stroke-width="2"/>

        <!-- Tank: prediction line (dashed, hidden initially) -->
        <line id="tank-pred-line" x1="6" y1="0" x2="34" y2="0"
              stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,3" opacity="0"/>

        <!-- Axes -->
        <line x1="45" y1="260" x2="330" y2="260" stroke="#888" stroke-width="1.5"/>
        <line x1="45" y1="265" x2="45" y2="5" stroke="#888" stroke-width="1.5"/>
        <polygon points="330,260 323,256 323,264" fill="#888"/>
        <polygon points="45,5 41,12 49,12" fill="#888"/>

        <!-- Axis labels -->
        <text x="330" y="278" font-size="11" fill="#888" text-anchor="end">t (hr)</text>
        <text x="30" y="15" font-size="11" fill="#888" text-anchor="middle">h (m)</text>

        <!-- t-axis tick labels -->
        <text x="45"    y="278" font-size="10" fill="#999" text-anchor="middle">0</text>
        <text x="91.7"  y="278" font-size="10" fill="#999" text-anchor="middle">1</text>
        <text x="138.3" y="278" font-size="10" fill="#999" text-anchor="middle">2</text>
        <text x="185"   y="278" font-size="10" fill="#999" text-anchor="middle">3</text>
        <text x="231.7" y="278" font-size="10" fill="#999" text-anchor="middle">4</text>
        <text x="278.3" y="278" font-size="10" fill="#999" text-anchor="middle">5</text>
        <text x="325"   y="278" font-size="10" fill="#999" text-anchor="middle">6</text>

        <!-- h-axis tick labels -->
        <text x="40" y="264"  font-size="10" fill="#999" text-anchor="end">0</text>
        <text x="40" y="214"  font-size="10" fill="#999" text-anchor="end">4</text>
        <text x="40" y="164"  font-size="10" fill="#999" text-anchor="end">8</text>
        <text x="40" y="114"  font-size="10" fill="#999" text-anchor="end">12</text>
        <text x="40" y="64"   font-size="10" fill="#999" text-anchor="end">16</text>
        <text x="40" y="14"   font-size="10" fill="#999" text-anchor="end">20</text>

        <!-- Curve (clipped to plot area) -->
        <g clip-path="url(#plot-clip)">
          <path id="curve" d="" stroke="#2196F3" stroke-width="2.5" fill="none"/>
        </g>

        <!-- Prediction horizontal line across graph (hidden initially) -->
        <line id="pred-line" x1="45" y1="0" x2="325" y2="0"
              stroke="#e67e22" stroke-width="1.5" stroke-dasharray="8,6" opacity="0"/>

        <!-- Correct horizontal line (hidden initially) -->
        <line id="correct-line" x1="45" y1="0" x2="325" y2="0"
              stroke="#2ecc40" stroke-width="2" opacity="0"/>
      </svg>
    </div>

    <!-- Input: h = [[ ]] -->
    <div class="func-input">
      <span id="func-label"></span>
      <div class="slot active" id="slot-h"></div>
    </div>

    <!-- Keyboard -->
    <div class="keyboard-area">
      <div class="keyboard-row">
        <div class="key" data-val="1">1</div>
        <div class="key" data-val="2">2</div>
        <div class="key" data-val="3">3</div>
        <div class="key" data-val="4">4</div>
        <div class="key" data-val="5">5</div>
        <div class="key" data-val=".">.</div>
      </div>
      <div class="keyboard-row">
        <div class="key" data-val="6">6</div>
        <div class="key" data-val="7">7</div>
        <div class="key" data-val="8">8</div>
        <div class="key" data-val="9">9</div>
        <div class="key" data-val="0">0</div>
        <div class="key wide" data-val="backspace">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </div>
      </div>
    </div>

    <div class="bottom-spacer"></div>
  </div>

  <div class="bottom-bar">
    <div class="tutor-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>
    <button class="check-btn" id="check-btn">Check</button>
  </div>
</div>

<script>
function renderLatex(el, latex) {
  katex.render(latex, el, { throwOnError: false });
}

// Graph coordinate system
// t: 0..6 -> x: 45..325   (280px)
// h: 0..20 -> svgY: 260..10 (250px, inverted)
const G = { xMin: 45, xMax: 325, yMin: 260, yMax: 10, tMax: 6, hMax: 20 };

function tToX(t) { return G.xMin + (t / G.tMax) * (G.xMax - G.xMin); }
function hToY(h) { return G.yMin - (h / G.hMax) * (G.yMin - G.yMax); }

// Water height: h(t) = 4 + 16 * 0.5^t
// h(0)=20, h(1)=12, h(2)=8, asymptote at h=4
const H_LEAK = 4;
const H_0 = 20;
function waterH(t) { return H_LEAK + (H_0 - H_LEAK) * Math.pow(0.5, t); }

function buildPath(fn, tStart, tEnd, steps) {
  let d = '';
  for (let i = 0; i <= steps; i++) {
    const t = tStart + (tEnd - tStart) * (i / steps);
    const h = fn(t);
    d += (i === 0 ? 'M' : 'L') + tToX(t).toFixed(1) + ',' + hToY(h).toFixed(1);
  }
  return d;
}

// Tank water level
function setWaterLevel(h) {
  const sy = hToY(h);
  const fill = document.getElementById('water-fill');
  fill.setAttribute('y', sy);
  fill.setAttribute('height', G.yMin - sy);
  const surface = document.getElementById('water-surface');
  surface.setAttribute('y1', sy);
  surface.setAttribute('y2', sy);
}

// Prediction lines (graph + tank)
function showPrediction(h) {
  const sy = hToY(h);

  const pl = document.getElementById('pred-line');
  pl.setAttribute('y1', sy);
  pl.setAttribute('y2', sy);
  pl.setAttribute('opacity', '1');

  const tpl = document.getElementById('tank-pred-line');
  tpl.setAttribute('y1', sy);
  tpl.setAttribute('y2', sy);
  tpl.setAttribute('opacity', '1');
}

function showCorrectLine(h) {
  const sy = hToY(h);
  const cl = document.getElementById('correct-line');
  cl.setAttribute('y1', sy);
  cl.setAttribute('y2', sy);
  cl.setAttribute('opacity', '1');

  document.getElementById('pred-line').setAttribute('opacity', '0');

  const tpl = document.getElementById('tank-pred-line');
  tpl.setAttribute('stroke', '#2ecc40');
  tpl.setAttribute('stroke-dasharray', 'none');
  tpl.setAttribute('opacity', '1');
}

function showLabel(text) {
  const el = document.getElementById('stage-label');
  el.textContent = text;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1800);
}

let animRunning = false;
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Animate curve from tStart to tEnd over duration ms
async function animateCurve(tStart, tEnd, duration) {
  const curve = document.getElementById('curve');
  const startTime = performance.now();

  // Build the prefix path (everything before tStart) if tStart > 0
  const prefixPath = tStart > 0 ? buildPath(waterH, 0, tStart, 60) : '';

  return new Promise(resolve => {
    function frame(now) {
      const progress = Math.min((now - startTime) / duration, 1);
      const currentT = tStart + progress * (tEnd - tStart);

      // Draw full curve from 0 to currentT
      const steps = Math.max(2, Math.floor((currentT / G.tMax) * 100));
      curve.setAttribute('d', buildPath(waterH, 0, currentT, steps));

      // Update tank water level to match current time
      setWaterLevel(waterH(currentT));

      if (progress < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });
}

async function animate() {
  if (animRunning) return;
  animRunning = true;

  const curve = document.getElementById('curve');
  const predLine = document.getElementById('pred-line');
  const correctLine = document.getElementById('correct-line');
  const tankPredLine = document.getElementById('tank-pred-line');
  const slotH = document.getElementById('slot-h');
  const checkBtn = document.getElementById('check-btn');

  // === Reset ===
  curve.setAttribute('d', '');
  predLine.setAttribute('opacity', '0');
  correctLine.setAttribute('opacity', '0');
  tankPredLine.setAttribute('opacity', '0');
  tankPredLine.setAttribute('stroke', '#e67e22');
  tankPredLine.setAttribute('stroke-dasharray', '3,3');
  slotH.classList.add('active');
  slotH.classList.remove('filled');
  slotH.innerHTML = '';
  checkBtn.classList.remove('ready', 'correct');
  checkBtn.textContent = 'Check';

  setWaterLevel(H_0);
  renderLatex(document.getElementById('func-label'), 'h = ');

  await sleep(800);

  // === PHASE 1: Plot t=0 to t=2 (water drops from 20 to 8) ===
  showLabel('Water draining...');
  await animateCurve(0, 2, 2000);

  await sleep(1200);

  // === USER INPUT: Type "4" ===
  showLabel('Entering prediction...');
  await sleep(400);

  const key4 = document.querySelector('.key[data-val="4"]');
  key4.classList.add('pressed');
  await sleep(150);
  key4.classList.remove('pressed');

  slotH.classList.add('filled');
  renderLatex(slotH, '4');

  await sleep(400);

  // === Show prediction line at h=4 ===
  showPrediction(H_LEAK);

  await sleep(500);

  // Check button activates
  checkBtn.classList.add('ready');

  // === Pause, then press Check ===
  await sleep(1500);
  showLabel('Checking answer...');
  checkBtn.style.transform = 'scale(0.97)';
  await sleep(200);
  checkBtn.style.transform = '';

  // === PHASE 2: Continue curve from t=2 to t=6 ===
  await sleep(500);
  showLabel('Continuing to drain...');
  await animateCurve(2, 6, 3000);

  // === Correct! ===
  await sleep(400);
  showCorrectLine(H_LEAK);
  checkBtn.classList.remove('ready');
  checkBtn.classList.add('correct');
  checkBtn.textContent = 'Correct!';

  animRunning = false;
}

function init() {
  renderLatex(document.getElementById('func-label'), 'h = ');
  setWaterLevel(H_0);
}

document.getElementById('replay').addEventListener('click', () => {
  animRunning = false;
  setTimeout(animate, 100);
});

init();
setTimeout(animate, 800);
</script>
</body>
</html>
